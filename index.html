// ── CORE REST API HELPER ──────────────────────────────
// Every DB call goes through this single function.
// method : GET | POST | PATCH | DELETE
// table  : accounts | meetings | open_points | integrations
// params : query-string params for GET (filters, order, select)
// body   : JSON body for POST / PATCH
async function sbAPI(method, table, params = {}, body = null) {
  const base = `${SB_URL}/rest/v1/${table}`;
  const qs   = new URLSearchParams(params).toString();
  const url  = qs ? `${base}?${qs}` : base;

  const headers = {
    'apikey':        SB_KEY,
    // New sb_publishable keys must NOT go in Authorization header
    // Only send apikey header — leave Authorization empty for anon access
    'Content-Type':  'application/json',
    'Prefer':        'return=representation',
  };

  // For upsert (POST with conflict resolution)
  if (method === 'UPSERT') {
    headers['Prefer'] = 'resolution=merge-duplicates,return=representation';
    method = 'POST';
  }
  // For DELETE, no body needed
  if (method === 'DELETE') {
    delete headers['Prefer'];
  }

  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(url, opts);

  if (!res.ok) {
    const err = await res.json().catch(() => ({ message: res.statusText }));
    if(res.status===401){
      throw new Error('Supabase 401: Run this SQL in Supabase SQL Editor: '+
        'drop policy if exists "auth_all" on accounts; '+
        'create policy "public_all" on accounts for all using (true) with check (true);');
    }
    throw new Error(method+' /'+table+': '+(err.message||res.statusText));
  }

  // DELETE returns 204 No Content
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── AUTH REST API ─────────────────────────────────────
async function sbSignIn(email, password) {
  let res, data;
  try {
    res  = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method:  'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password }),
    });
    data = await res.json();
  } catch(e) {
    throw new Error('Cannot reach Supabase. Check your internet connection or Supabase project status.');
  }
  if (!res.ok) {
    const msg = data.error_description || data.msg || data.message || data.error || '';
    if (msg.toLowerCase().includes('allowlist') || msg.toLowerCase().includes('cors') || res.status===403) {
      const h=document.getElementById('cors-help');if(h)h.style.display='block';
      throw new Error('Domain not allowed. See the orange box below for fix instructions.');
    }
    if (msg.toLowerCase().includes('invalid login') || msg.toLowerCase().includes('invalid credentials')) {
      throw new Error('Incorrect email or password. Please try again.');
    }
    if (msg.toLowerCase().includes('email not confirmed')) {
      throw new Error('Please confirm your email first. Check your inbox for a confirmation link.');
    }
    throw new Error(msg || `Auth failed (${res.status})`);
  }
  AUTH_TOKEN   = data.access_token;
  currentUser  = data.user;
  localStorage.setItem('sb_token',   AUTH_TOKEN);
  localStorage.setItem('sb_user',    JSON.stringify(data.user));
  localStorage.setItem('sb_expires', String(Date.now() + (data.expires_in * 1000)));
  return data;
}

async function sbSignUp(email, password) {
  let res, data;
  try {
    res  = await fetch(`${SB_URL}/auth/v1/signup`, {
      method:  'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password }),
    });
    data = await res.json();
  } catch(e) {
    throw new Error('Cannot reach Supabase. Check your internet connection.');
  }
  if (!res.ok) {
    const msg = data.error_description || data.msg || data.message || data.error || '';
    if (msg.toLowerCase().includes('allowlist') || msg.toLowerCase().includes('cors') || res.status===403) {
      throw new Error('CORS Error: Go to Supabase → Authentication → URL Configuration → add your Vercel URL to Redirect URLs and Allowed Origins.');
    }
    if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already exists')) {
      throw new Error('This email is already registered. Please sign in instead.');
    }
    throw new Error(msg || `Signup failed (${res.status})`);
  }
  // If email confirmation is disabled, user gets a session immediately
  if (data.access_token) {
    AUTH_TOKEN  = data.access_token;
    currentUser = data.user;
    localStorage.setItem('sb_token',   AUTH_TOKEN);
    localStorage.setItem('sb_user',    JSON.stringify(data.user));
    localStorage.setItem('sb_expires', String(Date.now() + ((data.expires_in||3600) * 1000)));
  }
  return data;
}

async function sbSignOut() {
  if (AUTH_TOKEN) {
    await fetch(`${SB_URL}/auth/v1/logout`, {
      method:  'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${AUTH_TOKEN}` },
    }).catch(() => {});
  }
  AUTH_TOKEN  = null;
  currentUser = null;
  localStorage.removeItem('sb_token');
  localStorage.removeItem('sb_user');
  localStorage.removeItem('sb_expires');
}

async function sbRefreshToken() {
  const refreshToken = localStorage.getItem('sb_refresh');
  if (!refreshToken) return false;
  try {
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
      method:  'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body:    JSON.stringify({ refresh_token: refreshToken }),
    });
    if (!res.ok) return false;
    const data = await res.json();
    AUTH_TOKEN = data.access_token;
    localStorage.setItem('sb_token',   AUTH_TOKEN);
    localStorage.setItem('sb_expires', String(Date.now() + (data.expires_in * 1000)));
    return true;
  } catch(e) { return false; }
}

function restoreSession() {
  const token   = localStorage.getItem('sb_token');
  const user    = localStorage.getItem('sb_user');
  const expires = localStorage.getItem('sb_expires');
  if (token && user && expires && Date.now() < parseInt(expires)) {
    AUTH_TOKEN  = token;
    currentUser = JSON.parse(user);
    return true;
  }
  return false;
}

function switchTab(tab) {
  const isLogin = tab === 'login';
  const tLogin = document.getElementById('tab-login');
  const tSignup = document.getElementById('tab-signup');
  const hint = document.getElementById('signup-hint');
  const btn = document.getElementById('login-btn');
  if (tLogin) { tLogin.style.borderBottomColor = isLogin ? 'var(--blue)' : 'transparent'; tLogin.style.color = isLogin ? 'var(--blue)' : 'var(--tx3)'; }
  if (tSignup) { tSignup.style.borderBottomColor = !isLogin ? 'var(--blue)' : 'transparent'; tSignup.style.color = !isLogin ? 'var(--blue)' : 'var(--tx3)'; }
  if (hint) hint.style.display = isLogin ? 'none' : 'block';
  if (btn) btn.style.display = isLogin ? 'block' : 'none';
}

async function doLogin() {
  const email = document.getElementById('auth-email')?.value?.trim();
  const pass  = document.getElementById('auth-pass')?.value;
  const btn   = document.getElementById('login-btn');
  if (!email || !pass) { showAuthErr('Email and password required'); return; }
  if (btn) { btn.textContent = 'Signing in...'; btn.disabled = true; }
  try {
    // POST /auth/v1/token?grant_type=password
    await sbSignIn(email, pass);
    DB_MODE = 'live';
    await loadFromDB();
    document.body.innerHTML = '';
    initApp();
  } catch(e) {
    showAuthErr(e.message);
    if (btn) { btn.textContent = 'Sign In'; btn.disabled = false; }
  }
}

async function doSignup() {
  const email = document.getElementById('auth-email')?.value?.trim();

  const banner = document.createElement('div');
  banner.id = 'db-banner';
  const styles = {

    local:   'background:var(--amber-bg);border-bottom:1px solid var(--amber-bd);color:var(--amber)',

    error:   'background:var(--red-bg);border-bottom:1px solid var(--red-bd);color:var(--red)',
  };
  const msgs = {
    live:    `&#9679; Live &mdash; Connected to Supabase &middot; All changes sync automatically`,
    local:   '&#9675; Local Mode &mdash; No DB connected. Data resets on refresh.',

// ── GET: LOAD ALL DATA ────────────────────────────────
async function loadFromDB() {
  if (DB_MODE !== 'live') return;
  try {
    showDBBanner('syncing');

    // GET /rest/v1/accounts?order=company
    const accs = await sbAPI('GET', 'accounts', { order: 'company' });
    if (accs && accs.length) {
      // DB has data — load it
      accounts = accs.map(mapFromDB);
      console.log('Loaded ' + accounts.length + ' accounts from Supabase');
    } else {
      // DB is empty — check if we have a CSV backup to restore
      console.log('DB empty — checking for CSV backup...');
      const restored = await restoreFromCSVBackup();
      if (!restored) {
        // No backup — seed with built-in demo accounts
        console.log('No backup found — seeding demo accounts...');
        await seedAccountsToDB();
      }
    }

    // GET /rest/v1/meetings?order=meeting_date.desc
    const mtgs = await sbAPI('GET', 'meetings', { order: 'meeting_date.desc' });
    if (mtgs) {
      mtgs.forEach(m => {
        const a = accounts.find(ac => ac.id === m.account_id);
        if (a) { if (!a.meetings) a.meetings = []; a.meetings.push(mapMeetingFromDB(m)); }
      });
    }

    // GET /rest/v1/open_points?order=created_at
    const pts = await sbAPI('GET', 'open_points', { order: 'created_at' });
    if (pts) {
      pts.forEach(p => {
        const a = accounts.find(ac => ac.id === p.account_id);
        if (a) { if (!a.points) a.points = []; a.points.push(mapPointFromDB(p)); }
      });
      accounts.forEach(a => { a.openPts = (a.points || []).filter(p => p.status !== 'Resolved').length; });
    }

    // GET /rest/v1/integrations
    await loadIntegrationsFromDB();

    showDBBanner('live');
  } catch(e) {
    console.error('GET load error:', e);
    showDBBanner('error', e.message);
  }
}

// ── POST: CREATE ACCOUNT ──────────────────────────────
async function restoreFromCSVBackup(){
  // Try to restore from the last imported CSV stored in integrations table
  if(DB_MODE!=='live') return false;
  try{
    const rows=await sbAPI('GET','integrations',{service_name:'eq.csv_backup',select:'*'});
    if(!rows||!rows.length) return false;
    const backup=JSON.parse(rows[0].config||'{}');
    if(!backup.csv) return false;

    console.log('Restoring from CSV backup ('+backup.accountCount+' accounts)...');
    toast('Restoring your data from last import...');

    // Re-parse the CSV
    const lines=backup.csv.split('\n');
    if(lines.length<2) return false;
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const newAccounts=[];

    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const row=parseCSVRow(lines[i]);
      if(row.length<2)continue;
      const get=function(names){
        for(const n of names){
          const ix=headers.findIndex(h=>h.includes(n));
          if(ix>=0&&row[ix])return row[ix].trim();
        }
        return '';
      };
      const company=get(['summary','company name','company']);
      if(!company)continue;
      const jiraKey=get(['issue key','key','id','jira']);
      const statusRaw=get(['status']).toLowerCase();
      const stageMap={'sales hand':0,'handover':0,'discovery':1,'integr':2,'config':3,'training':4,'onsite':5,'golive':6,'go-live':6,'live':6,'already live':6,'audit':7,'stab':8,'done':8};
      let stageId='discovery';
      for(const k of Object.keys(stageMap)){
        if(statusRaw.includes(k)){stageId=STAGES[stageMap[k]]?STAGES[stageMap[k]].id:'discovery';break;}
      }
      const si=STAGES.findIndex(s=>s.id===stageId);
      const progMap=[8,18,38,52,65,78,95,88,100];
      newAccounts.push({
        jira:jiraKey||('IMP-'+uid()),company,
        region:get(['region'])||'Global',stage:stageId,status:'yellow',
        mrr:get(['mrr'])||'Not Set',prog:progMap[si>=0?si:0]||20,
        daysInStage:parseInt(get(['days','age']))||0,
        nextMile:get(['milestone'])||'',
        blocker:get(['blocker','pending reason','block'])||'',
        owner:get(['assignee','owner'])||'',
        plannedGL:get(['planned','due date'])||'',
        expectedGL:get(['expected','customer eta','due date'])||'',
        lastAct:new Date().toISOString().slice(0,10),
        nextMeet:'',openPts:0,auditSt:'Not Started',
        priority:get(['priority'])||'Medium',notes:'',
        meetings:[],points:[],checks:[false,false,false,false,false],
      });
    }

    if(!newAccounts.length) return false;

    // Insert into accounts table
    let saved=0;
    const inserted=[];
    for(const a of newAccounts){
      try{
        const payload=mapToDB(a);
        const result=await sbAPI('POST','accounts',{},{...payload,id:undefined});
        if(result&&result[0]){a.id=result[0].id;inserted.push(a);saved++;}
      }catch(e){a.id=uid();inserted.push(a);}
    }
    accounts=inserted;
    toast('Restored '+saved+' accounts from last CSV import ✓');
    return true;
  }catch(e){
    console.warn('CSV restore error:',e.message);
    return false;
  }
}

async function seedAccountsToDB() {

  let seeded = 0;
  for (const a of accounts) {
    try {

      if (result && result[0]) {

        saveA_local(a);
        seeded++;

async function saveAccountToDB(a) {
  if (DB_MODE !== 'live') return;
  try {
    const payload = mapToDB(a);
    const isNumericId = typeof a.id === 'number';

    try {
      if (isNumericId) {
        const result = await sbAPI('POST', 'accounts', {}, { ...payload, id: undefined });
        if (result && result[0] && result[0].id) {
          a.id = result[0].id;
          saveA_local(a);
        }
      } else {
        await sbAPI('UPSERT', 'accounts', {}, { ...payload, id: a.id });
      }
    } catch(saveErr) {
      // If schema cache error — try with minimal required columns only
      if (saveErr.message && saveErr.message.includes('schema cache')) {
        console.warn('Schema cache issue — retrying with minimal columns');
        const minPayload = {
          company: payload.company,
          stage: payload.stage||'handover',
          status: payload.status||'green',
          progress: payload.progress||0,
          owner: payload.owner||null,
          jira_key: payload.jira_key||null,
          region: payload.region||'Global',
        };
        if (isNumericId) {
          const r2 = await sbAPI('POST', 'accounts', {}, minPayload);
          if (r2 && r2[0] && r2[0].id) { a.id = r2[0].id; saveA_local(a); }
        } else {
          await sbAPI('UPSERT', 'accounts', {}, { ...minPayload, id: a.id });
        }
        toast('Saved with minimal fields. Run SQL to add missing columns.', false);
      } else {
        throw saveErr;
      }
    }
  } catch(e) {
    console.error('POST account error:', e.message);
    toast('DB save error: ' + e.message, false);
  }
}

async function loadIntegrationsFromDB() {
  // Load from localStorage cache first (instant)
  ['jira', 'email', 'calendar', 'whatsapp'].forEach(svc => {

    if (cached) {
      try {
        const cfg = JSON.parse(cached);

        if (svc === 'email')    integCfg.email    = { ...integCfg.email,    ...cfg };

  });
  // Then GET from DB (authoritative, overwrites cache)
  if (DB_MODE !== 'live') return;
  try {
    // GET /rest/v1/integrations?select=*
    const rows = await sbAPI('GET', 'integrations', { select: '*' });
    if (!rows || !rows.length) return;
    rows.forEach(row => {
      try {

        if (row.service_name === 'whatsapp') integCfg.whatsapp = { ...integCfg.whatsapp, ...cfg };
      } catch(e) {}
    });
  } catch(e) { console.warn('GET integrations error:', e.message); }
}

    nps: r.nps !== undefined ? r.nps : null, sentiment: r.sentiment || 'neutral',
    meetings: [], points: [],
  };
}
function mapToDB(a) {
  // Build payload — only include non-undefined values
  const p={
    jira_key: a.jira||null,
    company: a.company,
    region: a.region||'Global',
    stage: a.stage||'handover',
    status: a.status||'green',
    mrr_tier: a.mrr||'Not Set',
    progress: a.prog||0,
    planned_gl: a.plannedGL||null,
    expected_gl: a.expectedGL||null,
    days_in_stage: a.daysInStage||0,
    next_milestone: a.nextMile||null,
    blocker: a.blocker||null,
    owner: a.owner||null,
    last_activity: a.lastAct||null,
    next_meeting: a.nextMeet||null,
    open_points: a.openPts||0,
    audit_status: a.auditSt||'Not Started',
    priority: a.priority||'Medium',
    notes: a.notes||'',
    checks: a.checks||[],
    nps: a.nps??null,
    sentiment: a.sentiment||'neutral',
  };
  // Remove null values to avoid schema mismatch errors
  Object.keys(p).forEach(k=>{if(p[k]===undefined)delete p[k];});
  return p;
}
function mapMeetingFromDB(m)       { return { id: m.id, date: m.meeting_date, title: m.title || '', notes: m.notes || '' }; }
function mapMeetingToDB(m, accId)  { return { id: typeof m.id === 'number' ? undefined : m.id, account_id: accId, meeting_date: m.date, title: m.title, notes: m.notes }; }
function mapPointFromDB(p)         { return { id: p.id, title: p.title, prio: p.priority || 'Medium', owner: p.owner || '', age: p.age_days || 0, blocker: p.is_blocker || false, status: p.status || 'Open', notes: p.notes || '' }; }

// ── REALTIME POLLING (replaces WebSocket subscription) ──
function subscribeRealtime() {
  // Poll every 30 seconds to pick up changes from other CSMs
  if (dbSyncInterval) clearInterval(dbSyncInterval);
  dbSyncInterval = setInterval(async () => {
    if (DB_MODE !== 'live') return;
    try {
      // Only poll if we have a valid key
      if(!SB_KEY||SB_KEY==='YOUR_SUPABASE_ANON_KEY') return;
      const accs = await sbAPI('GET', 'accounts', { order: 'company' });
      if (accs) {
        const remapped = accs.map(mapFromDB);
        // Merge: keep local meetings/points, update account fields
        remapped.forEach(remote => {
          const local = accounts.find(a => a.id === remote.id);
          if (local) {
            Object.assign(local, remote);
            local.meetings = local.meetings || [];
            local.points   = local.points   || [];
          } else {
            accounts.push(remote);
          }
        });
        // Remove deleted accounts
        const remoteIds = new Set(remapped.map(a => a.id));
        accounts = accounts.filter(a => typeof a.id === 'number' || remoteIds.has(a.id));
        render();
      }
    } catch(e) { console.warn('Poll error:', e.message); }
    // Auto-escalate overdue blockers via Jira API
    if(integCfg.jira.connected&&integCfg.jira.autoEscalate){
      autoEscalateBlockers().catch(e=>console.warn('Auto-escalation error:',e.message));
    }
  }, 60000); // Poll every 60s
}

// ── PATCHED SAVE HOOKS ────────────────────────────────
function saveA_local(a) {
  const i = accounts.findIndex(x => x.id === a.id);
  if (i >= 0) accounts[i] = a;
}

// saveA: update local array + sync to DB if live
function saveA(a) {
  saveA_base(a);
  if (DB_MODE === 'live') saveAccountToDB(a);
}

function doDelete(id) {
  deleteAccountFromDB(id);
  accounts=accounts.filter(a=>a.id!==id);
  closeMO();closeDP();render();toast('Account deleted');
}

// saveAddMeeting is already defined above — patch it here for DB sync
const _saveAddMeeting_orig = saveAddMeeting;
saveAddMeeting = async function(accountId) {
  _saveAddMeeting_orig(accountId);
  setTimeout(async () => {
    const a = getA(accountId); if (!a || !a.meetings || !a.meetings.length) return;
    await saveMeetingToDB(a.meetings[0], accountId);
    await saveAccountToDB(a);
  }, 100);
};

const _deleteMeeting_orig = deleteMeeting;
deleteMeeting = function(accountId, meetingId) {
  deleteMeetingFromDB(meetingId);
  _deleteMeeting_orig(accountId, meetingId);
};

}

// ── INIT APP ──────────────────────────────────────────
function initApp() {
  if (!document.querySelectorAll('.app')[0]) { location.reload(); return; }
  showDBBanner('live');
  render();
}

// ── STARTUP (No Login Required) ──────────────────────
(async () => {
  // Load app immediately — no login screen
  render();
  // Try to connect to DB in background
  try {
    DB_MODE = 'live';
    await loadFromDB();
    subscribeRealtime();
    render();
    setTimeout(() => showDBBanner('live'), 100);
  } catch(e) {
    console.warn('DB load failed, running local mode:', e.message);
    DB_MODE = 'local';
    setTimeout(() => showDBBanner('local'), 100);
  }
})();
