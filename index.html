const sn=id=>SMAP[id]?SMAP[id].name:id;
const sl=id=>SMAP[id]?SMAP[id].sla:10;
const fmtD=d=>{if(!d)return '--';try{return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})}catch{return d}};
const dAgo=d=>{if(!d)return 999;return Math.floor((new Date()-new Date(d+'T00:00:00'))/86400000)};
const pcl=p=>p>=85?'p-g':p>=50?'p-a':'p-r';
const uid=()=>++nextId;

function calcHealth(a){
  if(a.stage==='golive'||a.stage==='stabilization'){return a.blocker?80:95;}
  let s=100;
  if(a.status==='red')s-=40; else if(a.status==='yellow')s-=20;
  if(a.daysInStage>sl(a.stage))s-=15;
  if(a.blocker)s-=15;
  if(a.openPts>=3)s-=10;
  if(dAgo(a.lastAct)>14)s-=10;
  if(!a.nextMeet)s-=5;
  return Math.max(0,s);
}

function badge(st){
  const m={green:['bx-g','dot-g','On Track'],yellow:['bx-a','dot-a','At Risk'],red:['bx-r','dot-r','Critical']};
  const d=m[st]||['bx-n','','?'];
  return `<span class="bx ${d[0]}"><span class="dot ${d[1]}"></span>${d[2]}</span>`;
}

function av(name,cls='av-s'){
  const i=(name||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  return `<div class="av ${cls}">${i}</div>`;
}

function hRing(a,sz=52){
  const sc=calcHealth(a);
  const col=sc>=70?'var(--green)':sc>=40?'var(--amber)':'var(--red)';
  const r=(sz-8)/2,ci=2*Math.PI*r,da=(sc/100)*ci;
  return `<div class="hr-wrap">
    <svg width="${sz}" height="${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="4"/>
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="4"
      stroke-dasharray="${da.toFixed(1)} ${ci.toFixed(1)}" stroke-dashoffset="${(ci*.25).toFixed(1)}" stroke-linecap="round"
      transform="rotate(-90 ${sz/2} ${sz/2})"/>
    <text x="${sz/2}" y="${sz/2+4}" text-anchor="middle" font-size="11" font-weight="600" fill="${col}" font-family="IBM Plex Mono">${sc}</text>
    </svg><span class="fx-xs tc-3">Health</span></div>`;
}

let DB_MODE='local';
let AUTH_TOKEN=null;
let currentUser=null;
let dbSyncInterval=null;

async function sbAPI(method,table,params={},body=null){
  const base=`${SB_URL}/rest/v1/${table}`;
  const qs=new URLSearchParams(params).toString();
  const url=qs?`${base}?${qs}`:base;
  const headers={
    'apikey':SB_APIKEY,
    'Authorization':`Bearer ${SB_KEY}`,
    'Content-Type':'application/json',
    'Prefer':'return=representation',
  };
  if(method==='UPSERT'){headers['Prefer']='resolution=merge-duplicates,return=representation';method='POST';}
  if(method==='DELETE'){delete headers['Prefer'];}
  const opts={method,headers};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url,opts);
  if(!res.ok){
    const err=await res.json().catch(()=>({message:res.statusText}));
    if(res.status===401)throw new Error('Supabase 401: Check your anon key and RLS policies.');
    throw new Error(method+' /'+table+': '+(err.message||res.statusText));
  }
  if(res.status===204)return null;
  const text=await res.text();
  return text?JSON.parse(text):null;
}

async function jiraAPI(method,path,body=null){
  const cfg=integCfg.jira;
  if(!cfg.url||!cfg.token||!cfg.email){throw new Error('Jira not configured.');}
  const cleanEmail=(cfg.email||'').replace(/\s+/g,'').toLowerCase().trim();
  const cleanToken=(cfg.token||'').replace(/\s+/g,'').trim();
  const base=cfg.url.replace(/\/+$/,'');
  const jiraPath=path.startsWith('/rest')?path:'/rest/api/3'+path;
  const auth='Basic '+btoa(cleanEmail+':'+cleanToken);

  // Strategy 1: Direct call (works on HTTPS/Vercel)
  try{
    const res=await fetch(base+jiraPath,{method,headers:{'Authorization':auth,'Accept':'application/json','Content-Type':'application/json'},...(body?{body:JSON.stringify(body)}:{})});
    if(res.status===401)throw new Error('Jira auth failed — check email and API token');
    if(res.ok){const t=await res.text();return t?JSON.parse(t):null;}
    if(res.status>=400&&res.status<500){const t=await res.text();return t?JSON.parse(t):null;}
  }catch(e){
    if(e.message.includes('auth failed'))throw e;
    console.warn('Direct Jira call blocked (CORS), trying edge function...');
  }

  // Strategy 2: Supabase Edge Function proxy
  try{
    const EDGE='https://lfhlpdonndbpaczyssor.supabase.co/functions/v1/dynamic-handler';
    const res=await fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},body:JSON.stringify({jiraUrl:cfg.url,email:cleanEmail,token:cleanToken,method,path,payload:body||undefined})});
    if(res.ok){const d=await res.json();if(!d.error)return d;throw new Error(d.error);}
    throw new Error('Edge HTTP '+res.status);
  }catch(e){console.warn('Edge function failed:',e.message);}

  // Strategy 3: CORS proxy fallback
  return jiraAPIFallback(method,path,body);
}

async function jiraAPIFallback(method,path,body=null){
  const cfg=integCfg.jira;
  const base=cfg.url.replace(/\/+$/,'');
  const target=base+(path.startsWith('/rest')?path:'/rest/api/3'+path);
  const auth='Basic '+btoa((cfg.email||'').trim()+':'+(cfg.token||'').trim());
  const reqOpts={method,headers:{'Content-Type':'application/json','Accept':'application/json','Authorization':auth},...(body?{body:JSON.stringify(body)}:{})};
  const proxies=['https://api.allorigins.win/raw?url='+encodeURIComponent(target),'https://corsproxy.io/?url='+encodeURIComponent(target)];
  let lastErr='All proxies failed';
  for(const url of proxies){
    try{
      const res=await fetch(url,reqOpts);
      if(res.status===0||res.status===403){continue;}
      if(res.status===401)throw new Error('Jira auth failed — check email and API token');
      if(!res.ok){const e=await res.json().catch(()=>({errorMessages:[res.statusText]}));throw new Error(((e.errorMessages||[])[0]||e.message||res.statusText));}
      if(res.status===204)return null;
      const text=await res.text();
      return text?JSON.parse(text):null;
    }catch(e){if(e.message.includes('auth failed'))throw e;lastErr=e.message;}
  }
  throw new Error('Jira connection failed: '+lastErr);
}

async function fetchJiraIssues(){
  const cfg=integCfg.jira;
  if(!cfg.project)throw new Error('Set Jira project key first');
  // Jira deprecated GET /search — now requires POST /search/jql (since 2024)
  const data=await jiraAPI('POST','/search/jql',{
    jql:'project='+cfg.project+' ORDER BY created DESC',
    maxResults:100,
    fields:['summary','status','assignee','priority','duedate','description','labels'],
  });
  return data.issues||[];
}

async function createJiraIssue(summary,description,priority,accountName){
  const cfg=integCfg.jira;
  return jiraAPI('POST','/issue',{fields:{project:{key:cfg.project||'OTB'},summary,description:{type:'doc',version:1,content:[{type:'paragraph',content:[{type:'text',text:description||summary}]}]},issuetype:{name:'Task'},priority:{name:priority||'Medium'},labels:accountName?[accountName.replace(/\s+/g,'-')]:[]}});
}

async function escalateJiraIssue(issueKey,reason){

async function addJiraComment(issueKey,comment){

async function pushOpenPointsToJira(accountId){
  const a=getA(accountId);if(!a)return;
  const pts=a.points.filter(p=>p.status!=='Resolved');
  if(!pts.length){toast('No open points to push',false);return;}
  if(!integCfg.jira.connected){toast('Configure Jira credentials first',false);return;}
  toast('Creating '+pts.length+' Jira issue(s)...');
  let ok=0,fail=0;
  for(const p of pts){
    try{const desc='Account: '+a.company+'\nStage: '+sn(a.stage)+'\nOwner: '+(p.owner||'Unassigned')+'\nAge: '+p.age+' days\nBlocker: '+(p.blocker?'YES':'No')+'\n\n'+(p.notes||'');const issue=await createJiraIssue('['+a.company+'] '+p.title,desc,p.prio==='High'?'High':'Medium',a.company);if(issue){p.jiraKey=issue.key;ok++;}}catch(e){console.error('Create error:',e.message);fail++;}
  }
  saveA(a);toast(ok?ok+' issue(s) created'+(fail?' ('+fail+' failed)':''):'Failed',ok>0);renderSettings();

async function syncFromJira(){
  if(!integCfg.jira.connected){toast('Configure Jira first',false);return;}
  const btn=document.getElementById('jira-sync-btn');
  if(btn){btn.textContent='Syncing...';btn.disabled=true;}
  try{
    const issues=await fetchJiraIssues();
    integCfg.jira.jiraIssues=issues;
    let updated=0;
    issues.forEach(issue=>{
      const a=accounts.find(ac=>ac.jira===issue.key);
      if(a){
        const st=(issue.fields&&issue.fields.status&&issue.fields.status.name||'').toLowerCase();
        if(st.includes('done')||st.includes('closed'))a.status='green';
        else if(st.includes('progress'))a.status='yellow';
        a.openPts=(a.points||[]).filter(p=>p.status!=='Resolved').length;
        saveA(a);updated++;
      }
    });
    toast('Synced '+issues.length+' issues. '+updated+' accounts updated.');renderSettings();
  }catch(e){toast('Sync failed: '+e.message,false);}
  if(btn){btn.textContent='Sync from Jira';btn.disabled=false;}
}

async function autoEscalateBlockers(){
  if(!integCfg.jira.connected)return;
  const threshold=parseInt(integCfg.jira.escalationDays)||7;
  const toEsc=accounts.filter(a=>a.blocker&&a.daysInStage>threshold);
  for(const a of toEsc){
    const pts=(a.points||[]).filter(p=>p.blocker&&p.status!=='Resolved'&&p.jiraKey);
    for(const p of pts){try{await escalateJiraIssue(p.jiraKey,'Blocker active '+a.daysInStage+' days. Account: '+a.company+'. '+a.blocker);}catch(e){console.warn('Escalation:',e.message);}}
  }
}

async function loadFromDB(){
  if(DB_MODE!=='live')return;
  try{

function autoRecalcStatus(){
  let changed=0;
  accounts.forEach(a=>{
    const stageSLA={'handover':5,'discovery':10,'integration':14,'config':12,'training':7,'onsite':5,'golive':30,'audit':7,'stabilization':30};
    const sla=stageSLA[a.stage]||14;
    let newStatus='green';
    if(a.stage==='golive'||a.stage==='stabilization'){newStatus='green';}
    else if(a.blocker){newStatus='red';}
    else if(a.daysInStage>sla*1.5){newStatus='red';}
    else if(a.daysInStage>sla||a.openPts>3){newStatus='yellow';}
    else if(a.prog<30&&a.daysInStage>sla*0.5){newStatus='yellow';}
    else{newStatus='green';}
    if(newStatus!==a.status){a.status=newStatus;saveA(a);changed++;}
  });
  render();toast('Status recalculated for all '+accounts.length+' accounts'+(changed?' ('+changed+' changed)':''));
}

    return `<div class="card card-p mb3" style="border-left:3px solid ${stageCol};cursor:pointer" onclick="lcEditIdx=${i};renderLifecycle()"><div class="fx gap3 fxa"><div style="width:28px;height:28px;border-radius:50%;background:${stageCol};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div><div class="f1"><div class="fx fxa gap2 mb2 fxb"><div class="fx fxa gap2"><span class="fn fw6">${s.name}</span><span class="bx bx-b">SLA: ${s.sla}d</span>${s.owner?`<span class="bx bx-p" style="font-size:9px">&#128100; ${s.owner}</span>`:''}</div><span class="fx-xs tc-3">Click to edit</span></div><div class="g2"><div class="card-sm"><div class="fx-xs fw6 t-g mb1">&#9654; Entry</div><div class="fx-s tc-2">${s.entry}</div></div><div class="card-sm"><div class="fx-xs fw6 mb1" style="color:var(--purple)">&#9654; Exit</div><div class="fx-s tc-2">${s.exit}</div></div></div></div></div></div>`;

function saveLCEdit(idx){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const name=g('lce-name-'+idx);if(!name){toast('Stage name required',false);return;}
  STAGES[idx].name=name;STAGES[idx].sla=parseInt(g('lce-sla-'+idx))||STAGES[idx].sla;STAGES[idx].entry=g('lce-entry-'+idx)||STAGES[idx].entry;STAGES[idx].exit=g('lce-exit-'+idx)||STAGES[idx].exit;STAGES[idx].owner=g('lce-owner-'+idx)||'';
  STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});lcEditIdx=null;renderLifecycle();toast('Stage updated');
}

function deleteStage(idx){if(STAGES.length<=2){toast('Must keep at least 2 stages',false);return;}const name=STAGES[idx].name;STAGES.splice(idx,1);STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});lcEditIdx=null;renderLifecycle();toast('Stage removed: '+name);}
function moveStage(idx,dir){if(dir==='up'&&idx>0){[STAGES[idx-1],STAGES[idx]]=[STAGES[idx],STAGES[idx-1]];}else if(dir==='down'&&idx<STAGES.length-1){[STAGES[idx],STAGES[idx+1]]=[STAGES[idx+1],STAGES[idx]];}STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});lcEditIdx=null;renderLifecycle();}
const DEFAULT_STAGES_BACKUP=JSON.parse(JSON.stringify(STAGES));
function resetLifecycle(){if(!confirm('Reset all stages to default?'))return;STAGES.length=0;DEFAULT_STAGES_BACKUP.forEach(s=>STAGES.push({...s}));STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});lcEditIdx=null;renderLifecycle();toast('Lifecycle reset');}

// ── ALERTS ────────────────────────────────────────────
function renderAlerts(){
  document.getElementById('pt').textContent='Alerts';document.getElementById('ph-r').innerHTML='';
  const als=[];
  accounts.forEach(a=>{
    const s=sl(a.stage);
    if(a.blocker)als.push({t:'r',a,msg:`Active Blocker: "${a.blocker}"`});
    if(a.daysInStage>s)als.push({t:'r',a,msg:`SLA Breach: ${a.daysInStage}d in stage (SLA: ${s}d) — ${a.daysInStage-s}d over`});
    const ds=dAgo(a.lastAct);
    if(ds>14)als.push({t:'a',a,msg:`No activity for ${ds} days`});
    if(!a.nextMeet)als.push({t:'a',a,msg:'No meeting scheduled'});
  });
  document.getElementById('ps').textContent=`${als.filter(x=>x.t==='r').length} critical &middot; ${als.filter(x=>x.t==='a').length} warnings`;
  if(!als.length){document.getElementById('pb').innerHTML='<div style="text-align:center;color:var(--tx3);padding:40px;font-size:14px">No active alerts &#127881;</div>';return;}
  document.getElementById('pb').innerHTML=als.map(x=>`<div class="al al-${x.t}" onclick="openDP('${x.a.id}')"><div class="f1"><div class="fw6">${x.a.company} (${x.a.jira})</div><div class="mt1">${x.msg}</div><div class="fx-xs mt1" style="opacity:.65">Owner: ${x.a.owner} &middot; Stage: ${sn(x.a.stage)}</div></div></div>`).join('');
}

function generateWADigest(){
  const red=accounts.filter(a=>a.status==='red'),yel=accounts.filter(a=>a.status==='yellow');
  const totalOpen=accounts.reduce((s,a)=>s+a.openPts,0);
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  let msg=`*OTB Implementation Digest — ${today}*\n\n`;
  if(red.length){msg+=`🔴 *${red.length} Critical*\n`;red.forEach(a=>{msg+=`• ${a.company}${a.blocker?' — '+a.blocker.slice(0,40):''}\n`;});}
  if(yel.length){msg+=`\n🟡 *${yel.length} At Risk*\n`;yel.slice(0,3).forEach(a=>{msg+=`• ${a.company}\n`;});}
  msg+=`\n📋 *${totalOpen} Open Points*\n_Sent automatically_`;
  return msg.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>');
}

function buildEmailBody(a,tpl){
  if(!a)return '';
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  if(tpl==='Status Update')return `Hi Team,\n\nUpdate for ${a.company} as of ${today}.\n\nStage: ${sn(a.stage)}\nProgress: ${a.prog}%\nExpected Go-Live: ${fmtD(a.expectedGL)}\n${a.blocker?'\nActive Blocker: '+a.blocker+'\n':''}\nNext Milestone: ${a.nextMile||'TBD'}\n\nBest,\n${a.owner||'CS Team'}`;
  if(tpl==='Escalation Alert')return `URGENT — Escalation\n\nDear ${a.company} Team,\n\nBlocker: ${a.blocker||'(specify)'}\nDays Active: ${a.daysInStage}\n\nImmediate action required.\n\n${a.owner||'CS Team'}`;
  if(tpl==='Go-Live Confirmation')return `Congratulations!\n\n${a.company} is live on ${fmtD(a.expectedGL)}.\n\n${a.owner||'CS Team'}`;
  return `Weekly Summary — ${today}\n\nHi,\n\n${a.company} update:\nStage: ${sn(a.stage)}, ${a.prog}% complete\n\nCS Team`;
}

function sendEmail(){

// Import/Export
function openImportExportMO(){
  openMO(`<div class="mo-hd"><span class="mo-hd-title">&#8597; Jira Import / Export</span><button class="btn btn-sm" onclick="closeMO()">&#10005;</button></div><div class="mo-body"><div class="card-sm mb3"><div class="fn fw6 mb1">&#8593; Import CSV from Jira</div><label style="display:inline-block;background:var(--blue);color:#fff;padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500">Choose CSV File<input type="file" accept=".csv" style="display:none" onchange="importJiraCSV(this);closeMO()"></label></div><div class="divider"></div><div class="card-sm"><div class="fn fw6 mb1">&#8595; Export All Accounts</div><button class="btn btn-p btn-sm" onclick="exportAllJira();closeMO()">Download CSV</button></div></div><div class="mo-ft"><button class="btn" onclick="closeMO()">Close</button></div>`);
}

function parseCSVRow(line){const result=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){if(line[i]==='"'){inQ=!inQ;}else if(line[i]===','&&!inQ){result.push(cur);cur='';}else cur+=line[i];}result.push(cur);return result.map(v=>v.replace(/^"|"$/g,'').trim());}

function importJiraCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    const csvText=e.target.result;const lines=csvText.split('\n');
    if(lines.length<2){toast('CSV appears empty',false);return;}
    toast('Processing CSV...');
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const newAccounts=[];
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;const row=parseCSVRow(lines[i]);if(row.length<2)continue;
      const get=function(names){for(const n of names){const ix=headers.findIndex(h=>h.includes(n));if(ix>=0&&row[ix])return row[ix].trim();}return '';};
      const company=get(['summary','company name','company']);if(!company)continue;
      const jiraKey=get(['issue key','key','id','jira']);
      const statusRaw=get(['status']).toLowerCase();
      const stageMap={'sales hand':0,'handover':0,'discovery':1,'integr':2,'config':3,'training':4,'onsite':5,'golive':6,'go-live':6,'live':6,'already live':6,'audit':7,'stab':8,'done':8};
      let stageId='discovery';
      for(const k of Object.keys(stageMap)){if(statusRaw.includes(k)){stageId=STAGES[stageMap[k]]?STAGES[stageMap[k]].id:'discovery';break;}}
      const si=STAGES.findIndex(s=>s.id===stageId);const progMap=[8,18,38,52,65,78,95,88,100];
      newAccounts.push({jira:jiraKey||('IMP-'+uid()),company,region:get(['region'])||'Global',stage:stageId,status:'yellow',mrr:get(['mrr'])||'Not Set',prog:progMap[si>=0?si:0]||20,daysInStage:parseInt(get(['days','age']))||0,nextMile:get(['milestone'])||'',blocker:get(['blocker','pending reason','block'])||'',owner:get(['assignee','owner'])||'',plannedGL:get(['planned','due date'])||'',expectedGL:get(['expected','customer eta','due date'])||'',lastAct:new Date().toISOString().slice(0,10),nextMeet:'',openPts:0,auditSt:'Not Started',priority:get(['priority'])||'Medium',notes:'',meetings:[],points:[],checks:[false,false,false,false,false]});
    }
    if(!newAccounts.length){toast('No valid accounts found',false);return;}
    accounts=newAccounts.map(a=>({...a,id:uid()}));input.value='';render();toast('Imported '+newAccounts.length+' accounts');
  };
  reader.readAsText(file);
}

function exportAllJira(){
  const headers=['Jira Key','Company','Region','Stage','Status','MRR','Progress %','Planned GL','Expected GL','Days in Stage','Blocker','Owner','Open Points','Audit Status'];
  const rows=accounts.map(a=>[a.jira,a.company,a.region,sn(a.stage),a.status==='green'?'On Track':a.status==='yellow'?'At Risk':'Critical',a.mrr,a.prog,a.plannedGL||'',a.expectedGL||'',a.daysInStage,a.blocker||'',a.owner||'',a.openPts,a.auditSt].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv=[headers.join(',')].concat(rows).join('\n');const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='OTB_Export_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(u);toast('Exported '+accounts.length+' accounts');
}

function getMilestones(accountId){

  return milestones[accountId];
}

function saveEdit(id){

s.value)" style="width:52px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:3px 6px;color:var(--tx);font-size:12px"></td></tr>`;}).join('');

  document.getElementById('pt').textContent='Capacity Planner';document.getElementById('ps').textContent='CSM workload · Go-live forecast';document.getElementById('ph-r').innerHTML='';
  const owners=[...new Set(accounts.map(a=>a.owner).filter(Boolean))];
  const csmStats=owners.map(o=>{const mine=accounts.filter(a=>a.owner===o);const red=mine.filter(a=>a.status==='red').length;const yel=mine.filter(a=>a.status==='yellow').length;const avgH=mine.length?Math.round(mine.reduce((s,a)=>s+calcHealth(a),0)/mine.length):0;const overloaded=red>=2||(mine.length>=8);return {name:o,total:mine.length,red,yel,green:mine.filter(a=>a.status==='green').length,avgH,overloaded,accounts:mine};});
  const stageCounts=STAGES.map(s=>({...s,count:accounts.filter(a=>a.stage===s.id).length}));
  const bottlenecks=stageCounts.filter(s=>s.count>=4);
  const now=new Date();const in30=accounts.filter(a=>a.expectedGL&&new Date(a.expectedGL)<=new Date(now.getTime()+30*864e5)&&a.stage!=='stab'&&a.stage!=='golive');
  const csmCards=csmStats.map(c=>`<div class="card card-p" style="border-left:3px solid ${c.overloaded?'var(--red)':c.avgH>=70?'var(--green)':'var(--amber)'}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${av(c.name,'av-l')}<div class="f1"><div class="fn fw6">${c.name}</div><div class="fx-xs tc-3">${c.total} accounts · avg health ${c.avgH}</div></div>${c.overloaded?'<span class="bx bx-r" style="font-size:9px">Overloaded</span>':'<span class="bx bx-g" style="font-size:9px">Balanced</span>'}</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px"><div style="text-align:center;background:var(--red-bg);border-radius:var(--r);padding:6px"><div class="fn fw6 t-r">${c.red}</div><div class="fx-xs tc-3">Critical</div></div><div style="text-align:center;background:var(--amber-bg);border-radius:var(--r);padding:6px"><div class="fn fw6 t-a">${c.yel}</div><div class="fx-xs tc-3">At Risk</div></div><div style="text-align:center;background:var(--green-bg);border-radius:var(--r);padding:6px"><div class="fn fw6 t-g">${c.green}</div><div class="fx-xs tc-3">On Track</div></div></div></div>`).join('');
  document.getElementById('pb').innerHTML=`<div class="gm mb4"><div class="met"><div class="met-l">CSMs</div><div class="met-v">${owners.length}</div></div><div class="met"><div class="met-l">Go-Lives (30d)</div><div class="met-v t-b">${in30.length}</div></div><div class="met"><div class="met-l">Bottlenecks</div><div class="met-v ${bottlenecks.length?'t-r':'t-g'}">${bottlenecks.length}</div></div></div><div class="g2 mb4"><div class="card card-p"><div class="sec-title mb3">Stage Counts</div>${stageCounts.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><div class="fx-xs tc-2" style="width:130px;flex-shrink:0">${s.name}</div><div style="flex:1;background:var(--bg3);border-radius:100px;height:5px;overflow:hidden"><div style="height:100%;width:${accounts.length?Math.round((s.count/accounts.length)*100):0}%;background:${s.count>=4?'var(--red)':s.count>=2?'var(--amber)':'var(--blue)'};border-radius:100px"></div></div><span class="mono fx-xs" style="min-width:16px;text-align:right;color:${s.count>=4?'var(--red)':'var(--tx2)'}">${s.count}</span></div>`).join('')}</div><div class="card card-p"><div class="sec-title mb3">Go-Lives (30 days)</div>${in30.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)"><span class="fw5 fn f1">${a.company}</span>${badge(a.status)}<span class="fx-xs tc-3">${fmtD(a.expectedGL)}</span></div>`).join('')||'<div class="fn tc-3">None scheduled</div>'}</div></div><div class="sec-title mb3">CSM Workload</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">${csmCards}</div>`;
}

  {id:'pb3',stage:'training',icon:'📚',title:'Training Playbook',tags:['LMS','Super-user'],steps:[{title:'Confirm 2 super-users',desc:'Primary + backup',action:'Customer'},{title:'Share training schedule',desc:'2 weeks in advance',action:'CSM'},{title:'Conduct training modules',desc:'Core workflows, reporting, settings',action:'CSM'},{title:'Training sign-off',desc:'80%+ attendance required',action:'Both'}],watchouts:['Attendance <60% → reschedule'],kpi:'SLA: 7 days. Exit: Training sign-off, 80%+ attendance.'},

let selPB=null;let pbMode='list';

function renderPlaybooks(){
  document.getElementById('pt').textContent='Playbooks';
  document.getElementById('ph-r').innerHTML=`<button class="btn btn-p btn-sm" onclick="pbMode='new';renderPlaybooks()">+ New Playbook</button>`;
  if(pbMode==='view'&&selPB!==null){renderPlaybookDetail();return;}
  renderPlaybookList();

function renderPlaybookList(){
  document.getElementById('ps').textContent='Stage-by-stage implementation guides';
  const cards=PLAYBOOKS_DATA.map((pb,i)=>{const col=pb.stage==='golive'?'var(--green)':pb.stage==='integration'?'var(--amber)':'var(--blue)';return `<div class="card card-p" style="border-left:3px solid ${col}"><div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px"><span style="font-size:22px">${pb.icon}</span><div class="f1"><div class="fn fw6">${pb.title}</div><div class="fx-xs tc-3 mt1">${pb.steps.length} steps${pb.owner?' &middot; '+pb.owner:''}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">${pb.tags.map(t=>`<span class="bx bx-n" style="font-size:9px">${t}</span>`).join('')}</div></div></div><div class="fx-xs tc-3 mb3 italic">${pb.kpi.slice(0,80)}...</div><div class="fx gap2"><button class="btn btn-sm btn-p" onclick="selPB=${i};pbMode='view';renderPlaybooks()">View</button></div></div>`;}).join('');
  document.getElementById('pb').innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px">${cards}</div>`;
}

function renderPlaybookDetail(){
  const pb=PLAYBOOKS_DATA[selPB];if(!pb)return;
  document.getElementById('ps').textContent=pb.title;
  document.getElementById('ph-r').innerHTML=`<button class="btn btn-sm" onclick="pbMode='list';selPB=null;renderPlaybooks()">&#8592; All Playbooks</button>`;

  const steps=pb.steps.map((s,i)=>`<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:16px"><div style="width:26px;height:26px;border-radius:50%;background:${col};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${i+1}</div><div class="f1"><div class="fn fw6 mb1">${s.title}</div><div class="fx-s tc-2 mb2">${s.desc}</div><span class="bx ${s.action==='CSM'?'bx-b':s.action==='Customer'?'bx-a':s.action==='Integration Team'?'bx-p':'bx-g'}" style="font-size:9px">&#128100; ${s.action}</span></div></div>`).join('');
  document.getElementById('pb').innerHTML=`<div class="card card-p mb4" style="border-left:3px solid ${col}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:28px">${pb.icon}</span><div class="f1"><div style="font-size:16px;font-weight:600">${pb.title}</div><div style="font-size:11px;color:var(--tx3);margin-top:4px">${pb.kpi}</div></div></div></div><div class="g2"><div><div class="sec-title mb3">Steps (${pb.steps.length})</div>${steps}</div><div><div class="sec-title mb3">Watch-Outs</div><div class="card-sm">${pb.watchouts.map(w=>`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px"><span style="color:var(--red);flex-shrink:0">&#9888;</span><span class="tc-2">${w}</span></div>`).join('')}</div></div></div>`;

// ── REPORTS ───────────────────────────────────────────
let reportType='weekly';
function renderReports(){
  document.getElementById('pt').textContent='Reports';document.getElementById('ps').textContent='Status reports and exports';
  document.getElementById('ph-r').innerHTML=`<button class="btn btn-sm" onclick="printReport()">&#128438; Print / PDF</button>`;
  const rtabs=[{id:'weekly',label:'Weekly Status'},{id:'ceo',label:'CEO Summary'},{id:'account',label:'Account Report'}];

  document.getElementById('pb').innerHTML=`<div style="border-bottom:1px solid var(--bd);display:flex;margin:-18px -20px 18px;padding:0 20px">${tabHtml}</div>${body}`;

function renderWeeklyReport(){
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const red=accounts.filter(a=>a.status==='red'),yel=accounts.filter(a=>a.status==='yellow'),onTrack=accounts.filter(a=>a.status==='green'),blockers=accounts.filter(a=>a.blocker);
  return `<div id="report-content" style="max-width:720px"><div style="border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden"><div style="background:var(--blue);padding:20px 24px;color:#fff"><div style="font-size:20px;font-weight:700;margin-bottom:4px">Weekly Implementation Status Report</div><div style="opacity:.8;font-size:13px">${today}</div></div><div style="padding:20px 24px"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">${[['Total',accounts.length,''],['Critical',red.length,'color:var(--red)'],['At Risk',yel.length,'color:var(--amber)'],['On Track',onTrack.length,'color:var(--green)']].map(([l,v,s])=>`<div style="border:1px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;font-family:var(--m);${s}">${v}</div><div style="font-size:11px;color:var(--tx3)">${l}</div></div>`).join('')}</div>${blockers.length?`<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:8px">Active Blockers (${blockers.length})</div>${blockers.map(a=>`<div style="display:flex;gap:8px;padding:7px 10px;background:var(--red-bg);border-radius:var(--r);margin-bottom:5px;border-left:3px solid var(--red)"><div class="f1"><span class="fw5">${a.company}</span></div><div class="fx-xs tc-2">${a.blocker}</div></div>`).join('')}</div>`:''}<div class="fn fw6 mb2">Portfolio Overview</div><table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr style="background:var(--bg2)">${['Account','Stage','Status','Progress','Go-Live','Owner'].map(h=>`<th style="padding:7px 10px;text-align:left;font-size:10px;color:var(--tx3);border-bottom:1px solid var(--bd);text-transform:uppercase">${h}</th>`).join('')}</tr></thead><tbody>${accounts.map(a=>`<tr><td style="padding:7px 10px;border-bottom:1px solid var(--bd)"><span style="font-weight:500">${a.company}</span></td><td style="padding:7px 10px;border-bottom:1px solid var(--bd)"><span class="sc">${sn(a.stage)}</span></td><td style="padding:7px 10px;border-bottom:1px solid var(--bd)">${badge(a.status)}</td><td style="padding:7px 10px;border-bottom:1px solid var(--bd)"><span style="font-family:var(--m);font-size:11px">${a.prog}%</span></td><td style="padding:7px 10px;border-bottom:1px solid var(--bd);font-size:11px">${fmtD(a.expectedGL)}</td><td style="padding:7px 10px;border-bottom:1px solid var(--bd);font-size:11px">${a.owner||'--'}</td></tr>`).join('')}</tbody></table></div></div></div>`;
}

function renderCEOReport(){
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const avgH=Math.round(accounts.reduce((s,a)=>s+calcHealth(a),0)/accounts.length);
  const gl30=accounts.filter(a=>a.expectedGL&&new Date(a.expectedGL)<=new Date(Date.now()+30*864e5)&&a.stage!=='stab');
  return `<div id="report-content" style="max-width:720px"><div style="border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden"><div style="background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:24px;color:#fff"><div style="font-size:22px;font-weight:700;margin-bottom:4px">Executive Implementation Summary</div><div style="opacity:.75;font-size:13px">${today}</div></div><div style="padding:24px"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px">${[['Portfolio Health',avgH+'/100',avgH>=70?'var(--green)':avgH>=40?'var(--amber)':'var(--red)','Overall'],['Go-Lives (30d)',gl30.length,'var(--blue)','Next 30 days'],['Blocked',accounts.filter(a=>a.blocker).length,'var(--red)','Active blockers']].map(([l,v,col,desc])=>`<div style="border:1px solid var(--bd);border-radius:var(--r);padding:14px"><div style="font-size:22px;font-weight:700;color:${col};font-family:var(--m)">${v}</div><div style="font-weight:600;font-size:12px;margin:3px 0">${l}</div><div style="font-size:11px;color:var(--tx3)">${desc}</div></div>`).join('')}</div><div style="font-size:14px;font-weight:600;margin-bottom:10px">Key Actions Required</div>${accounts.filter(a=>a.status==='red'||a.blocker).slice(0,5).map(a=>`<div style="display:flex;gap:10px;padding:10px;border:1px solid var(--red-bd);border-radius:var(--r);background:var(--red-bg);margin-bottom:8px"><div class="f1"><div class="fw6 fn">${a.company} (${sn(a.stage)})</div><div class="fx-s tc-2 mt1">${a.blocker||'SLA breached'}</div></div><div class="fx-xs tc-2">Owner: ${a.owner||'--'}</div></div>`).join('')}</div></div></div>`;
}

function renderAccountReport(){
  const rawVal=document.getElementById('rpt-acc-sel')?.value||'';const selId=rawVal&&rawVal!=='undefined'?(isNaN(rawVal)?rawVal:parseInt(rawVal)):(accounts[0]?.id);
  const a=getA(selId)||accounts[0];const acOpts=accounts.map(ac=>`<option value="${ac.id}" ${ac.id==selId?'selected':''}>${ac.company}</option>`).join('');
  if(!a)return'<div class="fn tc-3">No accounts</div>';const si=SIDX[a.stage]??0;
  const lc=STAGES.map((s,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--bd)"><div style="width:18px;height:18px;border-radius:50%;background:${i<si?'var(--green)':i===si?'var(--blue)':'var(--bg3)'};color:${i<=si?'#fff':'var(--tx3)'};font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i<si?'&#10003;':i+1}</div><div class="fn f1" style="color:${i<si?'var(--tx3)':i===si?'var(--blue)':'var(--tx)'}">${s.name}</div><div class="fx-xs tc-3">${i<si?'Done':i===si?`Day ${a.daysInStage}/${s.sla}d`:''}</div></div>`).join('');
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span class="fn fw5">Account:</span><select id="rpt-acc-sel" class="fi" onchange="renderReports()">${acOpts}</select></div><div id="report-content" style="max-width:720px"><div style="border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden"><div style="background:var(--blue);padding:18px 22px;color:#fff"><div style="font-size:18px;font-weight:700">${a.company} — Implementation Status</div><div style="opacity:.8;font-size:12px;margin-top:3px">${a.jira} &middot; ${sn(a.stage)} &middot; ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div></div><div style="padding:18px 22px"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div style="border:1px solid var(--bd);border-radius:var(--r);padding:10px"><div class="fx-xs tc-3">Status</div><div class="fn fw5 mt1">${badge(a.status)}</div></div><div style="border:1px solid var(--bd);border-radius:var(--r);padding:10px"><div class="fx-xs tc-3">Progress</div><div class="fn fw5 mt1">${a.prog}%</div></div><div style="border:1px solid var(--bd);border-radius:var(--r);padding:10px"><div class="fx-xs tc-3">Go-Live</div><div class="fn fw5 mt1">${fmtD(a.expectedGL)}</div></div></div>${a.blocker?`<div style="background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:10px;margin-bottom:14px"><div class="fn fw6 t-r">Active Blocker</div><div class="fn tc-2 mt1">${a.blocker}</div></div>`:''}<div class="fn fw6 mb2">Lifecycle Progress</div>${lc}</div></div></div>`;
}

function printReport(){
  const rc=document.getElementById('report-content');if(!rc){toast('No report loaded',false);return;}
  const html='<html><head><title>Report</title><style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;padding:24px;background:#fff;color:#111;font-size:13px;line-height:1.5}.bx,.sc{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600}table{width:100%;border-collapse:collapse}th,td{padding:6px 10px;border:1px solid #e2e8f0;text-align:left;font-size:12px}th{background:#f8fafc}@media print{body{padding:0}}</style></head><body>'+rc.innerHTML+'</body></html>';
  const win=window.open('','_blank','width=900,height=700');if(!win){toast('Allow popups for print',false);return;}
  try{win.document.write(html);win.document.close();win.focus();setTimeout(()=>{try{win.print();}catch(e){}},600);}catch(e){toast('Use Ctrl+P to print',false);}
}
