<!DOCTYPE html><!-- build:1777566068 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTB Implementation Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0C0F;--bg1:#111418;--bg2:#181C22;--bg3:#1E2329;--bg4:#252B34;
  --bd:#252B34;--bd2:#2E3540;
  --tx:#E8ECF0;--tx2:#8B95A1;--tx3:#4A5260;
  --blue:#3B82F6;--blue2:#60A5FA;--blue-bg:rgba(59,130,246,.12);--blue-bd:rgba(59,130,246,.3);
  --green:#22C55E;--green-bg:rgba(34,197,94,.12);--green-bd:rgba(34,197,94,.3);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,.12);--amber-bd:rgba(245,158,11,.3);
  --red:#EF4444;--red-bg:rgba(239,68,68,.12);--red-bd:rgba(239,68,68,.3);
  --purple:#A78BFA;--purple-bg:rgba(167,139,250,.12);
  --r:6px;--rl:10px;--rxl:14px;
  --f:'IBM Plex Sans',sans-serif;--m:'IBM Plex Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--f);background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5}
/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:216px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:width .2s ease}
.sb.col{width:50px}
.sb-top{display:flex;align-items:center;gap:9px;padding:14px 12px;border-bottom:1px solid var(--bd);min-height:52px}
.sb-ico{width:26px;height:26px;border-radius:var(--r);background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.sb-lbl{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;flex:1}
.sb-tog{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:2px;flex-shrink:0;line-height:1}
.sb-tog:hover{color:var(--tx)}
nav{flex:1;padding:6px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;color:var(--tx2);font-size:12px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .12s;position:relative;white-space:nowrap;overflow:hidden}
.ni:hover{background:var(--bg2);color:var(--tx)}
.ni.on{background:var(--blue-bg);color:var(--blue)}
.ni-ic{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.ni-nb{background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:100px;padding:0 5px;margin-left:auto;flex-shrink:0;line-height:16px}
.sb-bot{padding:8px;border-top:1px solid var(--bd)}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);background:var(--bg2)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bd);background:var(--bg1);flex-shrink:0;gap:12px}
.ph-l .pt{font-size:14px;font-weight:600}
.ph-l .ps{font-size:11px;color:var(--tx3);margin-top:1px}
.ph-r{display:flex;gap:8px;align-items:center;flex-shrink:0}
.pb{flex:1;overflow-y:auto;padding:18px 20px}
/* ── COMPONENTS ── */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue2);font-weight:600;flex-shrink:0}
.av-s{width:22px;height:22px;font-size:8px}
.av-m{width:28px;height:28px;font-size:10px}
.av-l{width:34px;height:34px;font-size:12px}
/* Badges */
.bx{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;white-space:nowrap}
.bx-g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.bx-a{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.bx-r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.bx-b{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.bx-p{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.bx-n{background:var(--bg2);color:var(--tx2);border:1px solid var(--bd2)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-g{background:var(--green)}.dot-a{background:var(--amber)}.dot-r{background:var(--red)}
/* Stage chip */
.sc{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd);white-space:nowrap}
/* Progress */
.pw{background:var(--bg3);border-radius:100px;overflow:hidden}
.pb2{border-radius:100px;transition:width .3s}
.p-g{background:var(--green)}.p-a{background:var(--amber)}.p-r{background:var(--red)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--tx);transition:all .12s;font-family:var(--f);white-space:nowrap;padding:5px 12px}
.btn:hover{background:var(--bg3);border-color:var(--bd2)}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--blue);color:#fff;border-color:rgba(59,130,246,.6)}
.btn-p:hover{background:#2563EB}
.btn-g{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.btn-g:hover{background:rgba(34,197,94,.2)}
.btn-r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.btn-r:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}
/* Cards */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--rl)}
.card-p{padding:14px 16px}
.card-sm{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gm{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
/* Metrics */
.met{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px}
.met-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.met-v{font-size:22px;font-weight:600;line-height:1;font-family:var(--m)}
.met-s{font-size:10px;color:var(--tx3);margin-top:2px}
/* Table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:500;color:var(--tx3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--bg2);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none}
th:hover{color:var(--tx2)}
td{padding:8px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--tx)}
tr:hover td{background:rgba(59,130,246,.04)}
tr:last-child td{border-bottom:none}
/* Alert strip */
.al{display:flex;gap:10px;padding:10px 14px;border-radius:var(--r);border-left:3px solid;margin-bottom:7px;font-size:12px;cursor:pointer;transition:opacity .12s}
.al:hover{opacity:.85}
.al-r{background:var(--red-bg);border-left-color:var(--red);color:var(--red)}
.al-a{background:var(--amber-bg);border-left-color:var(--amber);color:var(--amber)}
/* Kanban */
.kb-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;height:calc(100vh - 110px)}
.kb-col{flex-shrink:0;width:185px;display:flex;flex-direction:column}
.kb-hd{font-size:10px;font-weight:600;color:var(--tx2);padding:6px 10px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--bd);margin-bottom:7px;display:flex;justify-content:space-between;text-transform:uppercase;letter-spacing:.4px}
.kb-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:5px;cursor:pointer;transition:all .12s}
.kb-card:hover{border-color:var(--blue-bd);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
/* Detail pane */
.dp-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:none}
.dp-ov.on{display:flex;justify-content:flex-end}
.dp{width:520px;max-width:100vw;height:100%;background:var(--bg1);border-left:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column}
.dp-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg1);z-index:5}
/* Pane tabs */
.ptabs{display:flex;border-bottom:1px solid var(--bd);padding:0 18px;flex-shrink:0}
.ptab{padding:8px 11px;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap}
.ptab:hover{color:var(--tx2)}
.ptab.on{color:var(--blue);border-bottom-color:var(--blue)}
.ptab-nb{font-size:9px;background:var(--red-bg);color:var(--red);border-radius:100px;padding:0 4px;margin-left:3px}
/* Lifecycle */
.lc-row{display:flex;gap:10px;align-items:flex-start;padding:5px 0}
.lc-nd{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd2);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--tx3);flex-shrink:0;margin-top:1px}
.lc-nd.done{background:var(--green);border-color:var(--green);color:#fff}
.lc-nd.cur{background:var(--blue);border-color:var(--blue);color:#fff}
.lc-nd.blk{background:var(--red);border-color:var(--red);color:#fff}
.lc-ln{width:1px;background:var(--bd);height:16px;margin:2px 8px}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mo-box{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--rxl);width:580px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.mo-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);flex-shrink:0}
.mo-hd-title{font-size:14px;font-weight:600}
.mo-body{padding:18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px}
.mo-ft{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;background:var(--bg2);border-radius:0 0 var(--rxl) var(--rxl);flex-shrink:0}
/* Form fields */
.fl{display:flex;flex-direction:column;gap:4px}
.fl label{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.fl input,.fl select,.fl textarea{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:7px 10px;font-size:12px;color:var(--tx);font-family:var(--f);width:100%;transition:border-color .12s}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--blue)}
.fl textarea{resize:vertical;min-height:68px;line-height:1.5}
.fl select option{background:var(--bg2);color:var(--tx)}
.fg{display:grid;gap:10px}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
/* Filters */
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.fi{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--r);padding:6px 10px;font-size:12px;color:var(--tx);font-family:var(--f);transition:border-color .12s}
.fi:focus{outline:none;border-color:var(--blue)}
.fi-s{flex:1;min-width:180px}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:999;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;border:1px solid}
.toast.on{opacity:1;transform:translateY(0)}
.toast-ok{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.toast-er{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
/* Health ring */
.hr-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
/* Open points */
.op-row{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--bd)}
.op-row:last-child{border-bottom:none}
/* Checklist */
.cl-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:all .12s}
.cl-row:last-child{border-bottom:none}
.cl-row:hover{color:var(--blue)}
.cl-chk{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--bd2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .12s}
.cl-chk.done{background:var(--green);border-color:var(--green);color:#fff}
/* Misc */
.fx{display:flex}.fxa{align-items:center}.fxb{justify-content:space-between}.fxw{flex-wrap:wrap}
.f1{flex:1}.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}.gap4{gap:16px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.fn{font-size:12px}.fx-s{font-size:11px}.fx-xs{font-size:10px}
.fw5{font-weight:500}.fw6{font-weight:600}
.tc-2{color:var(--tx2)}.tc-3{color:var(--tx3)}
.t-g{color:var(--green)}.t-a{color:var(--amber)}.t-r{color:var(--red)}.t-b{color:var(--blue)}
.mono{font-family:var(--m)}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.divider{height:1px;background:var(--bd);margin:12px 0}
.sec-title{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:100px}
/* Danger confirm overlay */
.confirm-box{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;width:340px;text-align:center}
.confirm-box h3{font-size:14px;margin-bottom:8px}
.confirm-box p{font-size:12px;color:var(--tx2);margin-bottom:16px}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sb" id="sb">
    <div class="sb-top">
      <div class="sb-ico">OTB</div>
      <span class="sb-lbl">Impl. Tracker</span>
      <button class="sb-tog" id="sb-tog" onclick="toggleSB()">&#8249;</button>
    </div>
    <nav id="nav">
      <button class="ni on" id="ni-dashboard" onclick="goPage('dashboard')"><span class="ni-ic">◈</span><span class="ni-tx">Dashboard</span></button>
      <button class="ni" id="ni-accounts"  onclick="goPage('accounts')"><span class="ni-ic">⊞</span><span class="ni-tx">Accounts</span></button>
      <button class="ni" id="ni-kanban"    onclick="goPage('kanban')"><span class="ni-ic">⋮⋮</span><span class="ni-tx">Kanban</span></button>
      <button class="ni" id="ni-lifecycle" onclick="goPage('lifecycle')"><span class="ni-ic">↺</span><span class="ni-tx">Lifecycle</span></button>
         <button class="ni" id="ni-alerts"    onclick="goPage('alerts')"><span class="ni-ic">&#9889;</span><span class="ni-tx">Alerts <span class="ni-nb" id="nb">0</span></span></button>
      <button class="ni" id="ni-health"    onclick="goPage('health')"><span class="ni-ic">&#128154;</span><span class="ni-tx">Health Pulse</span></button>
      <button class="ni" id="ni-capacity"  onclick="goPage('capacity')"><span class="ni-ic">&#128202;</span><span class="ni-tx">Capacity</span></button>
      <button class="ni" id="ni-playbooks" onclick="goPage('playbooks')"><span class="ni-ic">&#128214;</span><span class="ni-tx">Playbooks</span></button>
      <button class="ni" id="ni-reports"   onclick="goPage('reports')"><span class="ni-ic">&#128196;</span><span class="ni-tx">Reports</span></button>
      <button class="ni" id="ni-settings"  onclick="goPage('settings')"><span class="ni-ic">&#9881;</span><span class="ni-tx">Settings</span></button>
    </nav>
    <div class="sb-bot">
      <div class="sb-user">
        <div class="av av-s">CS</div>
        <div class="f1 trunc"><div class="fx-s fw5">CSM Team</div><div class="fx-xs tc-3">Administrator</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="ph">
      <div class="ph-l">
        <div class="pt" id="pt">Dashboard</div>
        <div class="ps" id="ps"></div>
      </div>
      <div class="ph-r" id="ph-r"></div>
    </div>
    <div class="pb" id="pb"></div>
  </div>
</div>

<!-- DETAIL PANE -->
<div class="dp-ov" id="dp-ov" onclick="if(event.target===this)closeDP()">
  <div class="dp" id="dp"></div>
</div>

<!-- MODAL -->
<div class="mo" id="mo" onclick="if(event.target===this)closeMO()">
  <div class="mo-box" id="mo-box"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const STAGES=[
  {id:'handover',   name:'Sales Handover',       sla:5,  entry:'Deal closed, contract signed',       exit:'Kickoff call completed, team assigned'},
  {id:'discovery',  name:'Discovery & Review',    sla:10, entry:'Kickoff done, NDA signed',            exit:'Requirements doc approved by customer'},
  {id:'integration',name:'Integration Setup',     sla:14, entry:'Integration Team assigned, sandbox access granted', exit:'UAT signed by Integration Team + Customer, Handover document signed by Integration Team Lead'},
  {id:'config',     name:'Configuration',         sla:12, entry:'Integration done, data mapped',       exit:'Config sign-off from customer'},
  {id:'training',   name:'Training',              sla:7,  entry:'Config complete, LMS access',         exit:'Training sign-off, attendance 80%+'},
  {id:'onsite',     name:'Onsite Implementation', sla:5,  entry:'Training done, site ready',           exit:'Go-live checklist cleared on-site'},
  {id:'golive',     name:'Already Live',           sla:30, entry:'Customer is live in production — system already running', exit:'Usage confirmed, hypercare complete, audit ready to begin'},
  {id:'audit',      name:'Audit & Validation',    sla:7,  entry:'Go-live done, test data loaded',      exit:'Audit report signed, zero P1 issues'},
  {id:'stab',       name:'Stabilization',         sla:30, entry:'Audit passed, sign-off received',     exit:'30 days stable, CSM hand-off'},
];
const SMAP=Object.fromEntries(STAGES.map(s=>[s.id,s]));
const SIDX=Object.fromEntries(STAGES.map((s,i)=>[s.id,i]));
const CHECKLIST=['System access verified for all users','Integration endpoints tested and passing','User accounts created and roles assigned','UAT sign-off received from customer','Go-live checklist approved'];
const INTEGRATION_CHECKLIST=[
  'Integration Team owner named and confirmed in writing',
  'Integration Requirements Document sent to customer',
  'Sandbox access confirmed by customer IT',
  'Daily standup meeting schedule locked',
  'Weekly status meeting schedule locked',
  'API endpoints configured and tested individually',
  'Webhooks set up and payload verified',
  'Data mapping document completed and signed off',
  'End-to-end integration test (Round 1) completed',
  'Top-to-Top call held (if triggered)',
  'UAT test cases document prepared (20+ scenarios)',
  'Integration UAT session executed by customer IT',
  'All UAT defects resolved (P1 count = 0)',
  'UAT Sign-off received from Integration Team Lead',
  'Customer UAT Sign-off received',
  'Handover package received from Integration Team',
  'Integration Sign-off document signed by CSM',
];
const LIVE_CHECKLIST=[
  'Go-live date logged in tracker',
  'Day 1 production health check completed',
  'All users can log in successfully',
  'Core transactions processing correctly in production',
  'Day 1 usage numbers documented',
  'Old system / manual process confirmed shut down',
  'Week 1 daily check-in schedule confirmed with customer',
  'P1 production issues resolved (count must be zero)',
  'User adoption tracked — 80%+ active users by Week 2',
  'NPS survey sent and scores collected from users',
  'Weekly status report sent to customer management',
  'All P1 and P2 open points resolved by Day 14',
  '30-day hypercare review meeting completed',
  'Account briefed and moved to Audit and Validation stage',
];
const REGIONS=['Global','KSA','UAE','Oman','Pakistan','Malaysia','South Africa','Tanzania','Myanmar','Rwanda','India','Philippines'];
const PRIOS=['High','Medium','Low'];
const MRRS=['$25k+','$10k-$25k','$5k-$10k','<$5k','Not Set'];

// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════

// HELPERS
// ═══════════════════════════════════════════════════════
const sn=id=>SMAP[id]?SMAP[id].name:id;
const sl=id=>SMAP[id]?SMAP[id].sla:10;
const fmtD=d=>{if(!d)return '--';try{return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})}catch{return d}};
const dAgo=d=>{if(!d)return 999;return Math.floor((new Date()-new Date(d+'T00:00:00'))/86400000)};
const pcl=p=>p>=85?'p-g':p>=50?'p-a':'p-r';
const uid=()=>++nextId;

function calcHealth(a){
  let s=100;
  if(a.status==='red')s-=40; else if(a.status==='yellow')s-=20;
  if(a.daysInStage>sl(a.stage))s-=15;
  if(a.blocker)s-=15;
  if(a.openPts>=3)s-=10;
  if(dAgo(a.lastAct)>14)s-=10;
  if(!a.nextMeet)s-=5;
  return Math.max(0,s);
}

function badge(st){
  const m={green:['bx-g','dot-g','On Track'],yellow:['bx-a','dot-a','At Risk'],red:['bx-r','dot-r','Critical']};
  const d=m[st]||['bx-n','','?'];
  return `<span class="bx ${d[0]}"><span class="dot ${d[1]}"></span>${d[2]}</span>`;
}

function av(name,cls='av-s'){
  const i=(name||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  return `<div class="av ${cls}">${i}</div>`;
}

function hRing(a,sz=52){
  const sc=calcHealth(a);
  const col=sc>=70?'var(--green)':sc>=40?'var(--amber)':'var(--red)';
  const r=(sz-8)/2,ci=2*Math.PI*r,da=(sc/100)*ci;
  return `<div class="hr-wrap">
    <svg width="${sz}" height="${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="4"/>
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="4"
      stroke-dasharray="${da.toFixed(1)} ${ci.toFixed(1)}" stroke-dashoffset="${(ci*.25).toFixed(1)}" stroke-linecap="round"
      transform="rotate(-90 ${sz/2} ${sz/2})"/>
    <text x="${sz/2}" y="${sz/2+4}" text-anchor="middle" font-size="11" font-weight="600" fill="${col}" font-family="IBM Plex Mono">${sc}</text>
    </svg><span class="fx-xs tc-3">Health</span></div>`;
}

function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(ok?'toast-ok':'toast-er');
  t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2600);
}

function getA(id){return accounts.find(x=>x.id===id);}
function saveA_base(a){const i=accounts.findIndex(x=>x.id===a.id);if(i>=0)accounts[i]=a;}

function goPage(p){
  curPage=p;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const el=document.getElementById('ni-'+p);
  if(el)el.classList.add('on');
  closeDP();
  render();
}

function render(){
  updateNB();
  ({dashboard:renderDash,accounts:renderAccounts,kanban:renderKanban,lifecycle:renderLifecycle,alerts:renderAlerts,settings:renderSettings,health:renderHealth,capacity:renderCapacity,playbooks:renderPlaybooks,reports:renderReports}[curPage]||renderDash)();
}

function updateNB(){
  const n=accounts.filter(a=>a.status==='red'||a.blocker).length;
  document.getElementById('nb').textContent=n;
}

  const owners=[...new Set(accounts.map(a=>a.owner).filter(Boolean))];

    <div class="f1"><div class="fn fw5">${o}</div>

function saveLCEdit(idx){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const name=g('lce-name-'+idx);
  if(!name){toast('Stage name is required',false);return;}
  STAGES[idx].name=name;
  STAGES[idx].sla=parseInt(g('lce-sla-'+idx))||STAGES[idx].sla;
  STAGES[idx].entry=g('lce-entry-'+idx)||STAGES[idx].entry;
  STAGES[idx].exit=g('lce-exit-'+idx)||STAGES[idx].exit;
  STAGES[idx].owner=g('lce-owner-'+idx)||'';
  // Rebuild SMAP and SIDX
  STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});
  lcEditIdx=null;renderLifecycle();toast('Stage updated');
}

function saveNewStage(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const name=g('lc-new-name');
  if(!name){toast('Stage name is required',false);return;}
  const newId='custom_'+uid();
  const sla=parseInt(g('lc-new-sla'))||7;
  const after=parseInt(document.getElementById('lc-new-after').value);
  const newStage={id:newId,name,sla,entry:g('lc-new-entry'),exit:g('lc-new-exit'),owner:g('lc-new-owner')};
  STAGES.splice(after+1,0,newStage);
  STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});
  lcEditIdx=null;renderLifecycle();toast('Stage added: '+name);
}

function deleteStage(idx){
  if(STAGES.length<=2){toast('Must keep at least 2 stages',false);return;}
  const name=STAGES[idx].name;
  STAGES.splice(idx,1);
  STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});
  lcEditIdx=null;renderLifecycle();toast('Stage removed: '+name);
}

function moveStage(idx,dir){
  if(dir==='up'&&idx>0){[STAGES[idx-1],STAGES[idx]]=[STAGES[idx],STAGES[idx-1]];}
  else if(dir==='down'&&idx<STAGES.length-1){[STAGES[idx],STAGES[idx+1]]=[STAGES[idx+1],STAGES[idx]];}
  STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});
  lcEditIdx=null;renderLifecycle();
}

const DEFAULT_STAGES_BACKUP=JSON.parse(JSON.stringify(STAGES));
function resetLifecycle(){
  if(!confirm('Reset all stages to default? Your custom stages will be lost.'))return;
  STAGES.length=0;
  DEFAULT_STAGES_BACKUP.forEach(s=>STAGES.push({...s}));
  STAGES.forEach((s,i)=>{SMAP[s.id]=s;SIDX[s.id]=i;});
  lcEditIdx=null;renderLifecycle();toast('Lifecycle reset to default');
}

// ── JIRA SETTINGS ──
// ── JIRA API HELPER ──────────────────────────────────
async function jiraAPI(method,path,body=null){
  const cfg=integCfg.jira;
  if(!cfg.url||!cfg.token||!cfg.email){
    throw new Error('Jira not configured. Add URL, email and API token in Settings.');
  }

  // ── Call Supabase Edge Function (server-side proxy — no CORS issues) ──
  const EDGE_URL='https://lfhlpdonndbpaczyssor.supabase.co/functions/v1/dynamic-handler';

  try{
    const res=await fetch(EDGE_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+SB_KEY,
      },
      body:JSON.stringify({
        jiraUrl: cfg.url,
        // Strip any markdown formatting from email e.g. [x](mailto:x) → x
        email:   (cfg.email||'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').trim(),
        token:   (cfg.token||'').replace(/\s+/g,'').trim(),
        method:  method,
        path:    path,
        payload: body||undefined,
      }),
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({error:res.statusText}));
      if(res.status===401) throw new Error('Jira auth failed — check email and API token');
      if(res.status===404) throw new Error('Edge Function not deployed yet — see setup instructions');
      throw new Error(err.error||err.message||'Jira API error ('+res.status+')');
    }

    const data=await res.json();
    if(data.error) throw new Error(data.error);
    return data;

  }catch(e){
    // If Edge Function not deployed, fall back to direct proxy attempts
    if(e.message.includes('not deployed')||e.message.includes('Failed to fetch')){
      console.warn('Edge function unavailable, trying CORS proxies...');
      return jiraAPIFallback(method,path,body);
    }
    throw e;
  }
}

// Fallback: direct CORS proxies (if edge function not deployed yet)
async function jiraAPIFallback(method,path,body=null){
  const cfg=integCfg.jira;
  const base=cfg.url.replace(/\/+$/,'');
  const target=base+'/rest/api/3'+path;
  const auth='Basic '+btoa((cfg.email||'')+':'+cfg.token);
  const reqOpts={
    method,
    headers:{
      'Content-Type':'application/json',
      'Accept':'application/json',
      'Authorization':auth,
    },
    ...(body?{body:JSON.stringify(body)}:{})
  };
  const proxies=[
    'https://api.allorigins.win/raw?url='+encodeURIComponent(target),
    'https://corsproxy.io/?url='+encodeURIComponent(target),
    'https://thingproxy.freeboard.io/fetch/'+target,
  ];
  let lastErr='All proxies failed';
  for(const url of proxies){
    try{
      const res=await fetch(url,reqOpts);
      if(res.status===0||res.status===403){continue;}
      if(res.status===401) throw new Error('Jira auth failed — check email and API token');
      if(!res.ok){const e=await res.json().catch(()=>({errorMessages:[res.statusText]}));throw new Error(((e.errorMessages||[])[0]||e.message||res.statusText));}
      if(res.status===204) return null;
      const text=await res.text();
      return text?JSON.parse(text):null;
    }catch(e){
      if(e.message.includes('auth failed')) throw e;
      lastErr=e.message;
    }
  }
  throw new Error('Jira connection failed. Please deploy the Supabase Edge Function. Error: '+lastErr);
}


async function fetchJiraIssues(){
  const cfg=integCfg.jira;
  if(!cfg.project) throw new Error('Set Jira project key first');
  const jql='project='+cfg.project+' ORDER BY created DESC';
  const data=await jiraAPI('GET','/search?jql='+encodeURIComponent(jql)+'&maxResults=100&fields=summary,status,assignee,priority,duedate,description,labels');
  return data.issues||[];
}

async function createJiraIssue(summary,description,priority,accountName){
  const cfg=integCfg.jira;
  return jiraAPI('POST','/issue',{
    fields:{
      project:{key:cfg.project||'OTB'},
      summary:summary,
      description:{type:'doc',version:1,content:[{type:'paragraph',content:[{type:'text',text:description||summary}]}]},
      issuetype:{name:'Task'},
      priority:{name:priority||'Medium'},
      labels:accountName?[accountName.replace(/\s+/g,'-')]:[],
    }
  });
}

async function escalateJiraIssue(issueKey,reason){
  await jiraAPI('PUT','/issue/'+issueKey,{fields:{priority:{name:'Critical'},labels:['escalated','blocker']}});
  await jiraAPI('POST','/issue/'+issueKey+'/comment',{
    body:{type:'doc',version:1,content:[{type:'paragraph',content:[{type:'text',text:'AUTO-ESCALATED: '+reason}]}]}
  });
}

async function addJiraComment(issueKey,comment){
  try{
    await jiraAPI('POST','/issue/'+issueKey+'/comment',{
      body:{type:'doc',version:1,content:[{type:'paragraph',content:[{type:'text',text:comment}]}]}
    });
    toast('Comment added to '+issueKey);
  }catch(e){toast('Failed: '+e.message,false);}
}

async function pushOpenPointsToJira(accountId){
  const a=getA(accountId);if(!a)return;
  const pts=a.points.filter(p=>p.status!=='Resolved');
  if(!pts.length){toast('No open points to push',false);return;}
  if(!integCfg.jira.connected){toast('Configure Jira credentials first',false);return;}
  toast('Creating '+pts.length+' Jira issue(s)...');
  let ok=0,fail=0;
  for(const p of pts){
    try{
      const desc='Account: '+a.company+'\nStage: '+sn(a.stage)+'\nOwner: '+(p.owner||'Unassigned')+'\nAge: '+p.age+' days\nBlocker: '+(p.blocker?'YES':'No')+'\n\n'+(p.notes||'');
      const issue=await createJiraIssue('['+a.company+'] '+p.title,desc,p.prio==='High'?'High':p.prio==='Medium'?'Medium':'Low',a.company);
      if(issue){p.jiraKey=issue.key;ok++;}
    }catch(e){console.error('Create error:',e.message);fail++;}
  }
  saveA(a);
  toast(ok?ok+' issue(s) created in Jira'+(fail?' ('+fail+' failed)':''):'Failed to create issues',ok>0);
  renderSettings();
}

async function syncFromJira(){
  if(!integCfg.jira.connected){toast('Configure Jira first',false);return;}
  const btn=document.getElementById('jira-sync-btn');
  if(btn){btn.textContent='Syncing...';btn.disabled=true;}
  try{
    const issues=await fetchJiraIssues();
    integCfg.jira.jiraIssues=issues;
    let updated=0;
    issues.forEach(issue=>{
      const a=accounts.find(ac=>ac.jira===issue.key);
      if(a){
        const st=(issue.fields&&issue.fields.status&&issue.fields.status.name||'').toLowerCase();
        if(st.includes('done')||st.includes('closed')) a.status='green';
        else if(st.includes('progress')) a.status='yellow';
        (a.points||[]).forEach(p=>{
          if(p.title&&issue.fields&&issue.fields.summary&&issue.fields.summary.includes(p.title.slice(0,20))){
            p.jiraKey=issue.key;
            if(st.includes('done')) p.status='Resolved';
          }
        });
        a.openPts=(a.points||[]).filter(p=>p.status!=='Resolved').length;
        saveA(a);updated++;
      }
    });
    toast('Synced '+issues.length+' issues. '+updated+' accounts updated.');
    renderSettings();
  }catch(e){
    toast('Sync failed: '+e.message,false);
  }
  if(btn){btn.textContent='Sync from Jira';btn.disabled=false;}
}

async function autoEscalateBlockers(){
  if(!integCfg.jira.connected) return;
  const threshold=parseInt(integCfg.jira.escalationDays)||7;
  const toEsc=accounts.filter(a=>a.blocker&&a.daysInStage>threshold);
  for(const a of toEsc){
    const pts=(a.points||[]).filter(p=>p.blocker&&p.status!=='Resolved'&&p.jiraKey);
    for(const p of pts){
      try{await escalateJiraIssue(p.jiraKey,'Blocker active '+a.daysInStage+' days. Account: '+a.company+'. '+a.blocker);}
      catch(e){console.warn('Escalation:',e.message);}
    }
  }
}

  if(escEl) integCfg.jira.escalationDays=parseInt(escEl.value)||7;

async function saveJiraCfg(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const url=g('j-url').replace(/\/+$/,'');
  const proj=g('j-proj');
  // Aggressively clean email — strip markdown, spaces, mailto: prefix
  const rawEmail=g('j-email');
  const email=rawEmail
    .replace(/\[([^\]]+)\]\([^)]*\)/g,'$1')  // [x](mailto:x) -> x
    .replace(/^mailto:/i,'')                        // mailto:x -> x
    .replace(/[<>]/g,'')                            // <x> -> x
    .replace(/\s+/g,'')                            // remove spaces
    .toLowerCase()
    .trim();
  // Clean token — remove spaces and newlines
  const token=g('j-tok').replace(/\s+/g,'').trim();
  if(!url||!email||!token){toast('Jira URL, email and API token are all required',false);return;}
  if(!email.includes('@')){toast('Email format invalid: '+email,false);return;}
  integCfg.jira.url=url;
  integCfg.jira.project=proj||'OTB';
  integCfg.jira.email=email;
  integCfg.jira.token=token;
  integCfg.jira.connected=true;
  // Save to Supabase integrations table
  await saveIntegrationToDB('jira',{
    url:integCfg.jira.url,
    project:integCfg.jira.project,
    email:integCfg.jira.email,
    token:integCfg.jira.token,
    connected:true,
    escalationDays:integCfg.jira.escalationDays||7,
    autoEscalate:integCfg.jira.autoEscalate||false,
  });
  toast('Jira credentials saved — testing connection...');
  // Auto-fetch issues to confirm connection works
  try{
    const issues=await fetchJiraIssues();
    integCfg.jira.jiraIssues=issues;
    toast('Connected! '+issues.length+' issues fetched from Jira');
  }catch(e){
    toast('Credentials saved but Jira fetch failed: '+e.message,false);
  }
  renderSettings();
}

function importJiraCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(e){
    const csvText=e.target.result;
    const lines=csvText.split('\n');
    if(lines.length<2){toast('CSV appears empty',false);return;}

    toast('Processing CSV...');

    // Parse CSV into account objects
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const newAccounts=[];

    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const row=parseCSVRow(lines[i]);
      if(row.length<2)continue;
      const get=function(names){
        for(const n of names){
          const ix=headers.findIndex(h=>h.includes(n));
          if(ix>=0&&row[ix])return row[ix].trim();
        }
        return '';
      };
      const company=get(['summary','company name','company']);
      if(!company)continue;
      const jiraKey=get(['issue key','key','id','jira']);
      const statusRaw=get(['status']).toLowerCase();
      const stageMap={'sales hand':0,'handover':0,'discovery':1,'integr':2,'config':3,'training':4,'onsite':5,'golive':6,'go-live':6,'live':6,'already live':6,'audit':7,'stab':8,'done':8};
      let stageId='discovery';
      for(const k of Object.keys(stageMap)){
        if(statusRaw.includes(k)){stageId=STAGES[stageMap[k]]?STAGES[stageMap[k]].id:'discovery';break;}
      }
      const si=STAGES.findIndex(s=>s.id===stageId);
      const progMap=[8,18,38,52,65,78,95,88,100];
      newAccounts.push({
        jira:jiraKey||('IMP-'+uid()),
        company,
        region:get(['region'])||'Global',
        stage:stageId,
        status:get(['status_color'])||'yellow',
        mrr:get(['mrr','story points'])||'Not Set',
        prog:progMap[si>=0?si:0]||20,
        daysInStage:parseInt(get(['days','age']))||0,
        nextMile:get(['milestone','fix versions'])||'',
        blocker:get(['blocker','pending reason','block','flagged'])||'',
        owner:get(['assignee','owner'])||'',
        plannedGL:get(['planned','due date'])||'',
        expectedGL:get(['expected','customer eta','due date'])||'',
        lastAct:new Date().toISOString().slice(0,10),
        nextMeet:'',openPts:0,auditSt:'Not Started',
        priority:get(['priority'])||'Medium',
        notes:get(['description','comment'])||'',
        meetings:[],points:[],
        checks:[false,false,false,false,false],
      });
    }

    if(!newAccounts.length){toast('No valid accounts found in CSV',false);return;}

    if(DB_MODE==='live'){
      // ── SUPABASE: Delete all existing accounts then insert fresh ──
      toast('Clearing old data and uploading '+newAccounts.length+' accounts...');
      try{
        // Step 1: Delete all existing accounts in DB
        // (cascade deletes meetings and open_points too)
        const existing=await sbAPI('GET','accounts',{select:'id'});
        if(existing&&existing.length){
          for(const row of existing){
            await sbAPI('DELETE','accounts',{id:'eq.'+row.id}).catch(()=>{});
          }
        }

        // Step 2: Insert all new accounts
        let saved=0;
        const insertedAccounts=[];
        for(const a of newAccounts){
          try{
            const payload=mapToDB(a);
            const result=await sbAPI('POST','accounts',{},{...payload,id:undefined});
            if(result&&result[0]){
              a.id=result[0].id; // assign UUID from DB
              insertedAccounts.push(a);
              saved++;
            }
          }catch(e){
            console.warn('Insert failed for '+a.company+':',e.message);
            a.id=uid(); // fallback local ID
            insertedAccounts.push(a);
          }
        }

        // Step 3: Also save raw CSV to integrations table for re-use
        await saveIntegrationToDB('csv_backup',{
          csv:csvText,
          importedAt:new Date().toISOString(),
          accountCount:saved,
        });

        accounts=insertedAccounts;
        input.value='';
        render();
        toast(saved+' accounts saved to Supabase — data persists on refresh ✓');

      }catch(e){
        // Fallback: save locally only
        console.error('DB import error:',e.message);
        accounts=newAccounts.map(a=>({...a,id:uid()}));
        input.value='';
        render();
        toast('Imported locally (DB error: '+e.message+')',false);
      }

    } else {
      // Local mode — just replace in memory
      accounts=newAccounts.map(a=>({...a,id:uid()}));
      input.value='';
      render();
      toast('Imported '+newAccounts.length+' accounts (local mode — connect DB to persist)');
    }
  };
  reader.readAsText(file);
}

function parseCSVRow(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===','&&!inQ){result.push(cur);cur='';}
    else cur+=line[i];
  }
  result.push(cur);
  return result.map(function(v){return v.replace(/^"|"$/g,'').trim();});
}

function generateWADigest(){
  const red=accounts.filter(a=>a.status==='red'),yel=accounts.filter(a=>a.status==='yellow');
  const totalOpen=accounts.reduce((s,a)=>s+a.openPts,0);
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  let msg=`*OTB Implementation Digest — ${today}*\n\n`;
  if(red.length){msg+=`🔴 *${red.length} Critical Account${red.length>1?'s':''}*\n`;red.forEach(a=>{msg+=`• ${a.company}${a.blocker?' — '+a.blocker.slice(0,40):''}\n`;});}
  if(yel.length){msg+=`\n🟡 *${yel.length} At Risk*\n`;yel.slice(0,3).forEach(a=>{msg+=`• ${a.company} (${sn(a.stage)})\n`;});}
  msg+=`\n📋 *${totalOpen} Open Points* across ${accounts.filter(a=>a.openPts>0).length} accounts`;
  const glSoon=accounts.filter(a=>a.expectedGL&&new Date(a.expectedGL)<=new Date(Date.now()+14*86400000)&&a.stage!=='stab');
  if(glSoon.length){msg+=`\n\n🚀 *Go-Lives in 14 days*\n`;glSoon.forEach(a=>{msg+=`• ${a.company} → ${fmtD(a.expectedGL)}\n`;});}
  msg+=`\n_Sent automatically_`;
  return msg.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>');
}

function buildEmailBody(a,tpl){
  if(!a)return '';
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  if(tpl==='Status Update')return `Hi Team,\n\nHere is the latest implementation update for ${a.company} as of ${today}.\n\nStage: ${sn(a.stage)}\nProgress: ${a.prog}%\nExpected Go-Live: ${fmtD(a.expectedGL)}\n${a.blocker?'\nActive Blocker: '+a.blocker+'\n':''}\nNext Milestone: ${a.nextMile||'TBD'}\nNext Meeting: ${a.nextMeet?fmtD(a.nextMeet):'To be scheduled'}\n\nPlease reach out with any questions.\n\nBest regards,\n${a.owner||'CS Team'}`;
  if(tpl==='Escalation Alert')return `URGENT — Escalation Notice\n\nDear ${a.company} Team,\n\nWe are escalating a critical blocker affecting your implementation timeline.\n\nBlocker: ${a.blocker||'(please specify)'}\nDays Active: ${a.daysInStage}\nGo-Live Impact: Slipped from ${fmtD(a.plannedGL)} to ${fmtD(a.expectedGL)}\n\nImmediate action required. Please revert by EOD.\n\nBest,\n${a.owner||'CS Team'}`;
  if(tpl==='Go-Live Confirmation')return `Congratulations!\n\nWe are pleased to confirm that ${a.company} is scheduled to go live on ${fmtD(a.expectedGL)}.\n\nAll systems have been tested and validated. Your dedicated CSM ${a.owner||'our team'} will be available for hypercare support during the first 30 days.\n\nWelcome to production!\n\nBest,\n${a.owner||'CS Team'}`;
  return `Weekly Implementation Summary — ${today}\n\nHi,\n\nBelow is this week's update for ${a.company}.\n\n${accounts.map(ac=>`• ${ac.company}: ${sn(ac.stage)}, ${ac.prog}% complete, ${ac.status==='green'?'On Track':ac.status==='yellow'?'At Risk':'Critical'}`).slice(0,5).join('\n')}\n\nBest,\nCS Team`;
}

function getMilestones(accountId){
  if(!milestones[accountId]){
    const a=getA(accountId);if(!a)return[];
    const si=SIDX[a.stage]??0;
    milestones[accountId]=STAGES.map((s,i)=>({
      id:uid(),stage:s.id,title:s.name,
      date:i<si?'Completed':i===si?a.lastAct||'':i===si+1?a.nextMeet||'':'',
      done:i<si,current:i===si,
      sla:s.sla,entry:s.entry,exit:s.exit,
    }));
  }
  return milestones[accountId];
}

function renderMilestoneTree(accountId){
  const ms=getMilestones(accountId);

  return `

        const bg=m.done?'var(--green-bg)':m.current?'var(--blue-bg)':'var(--bg2)';
        const bd=m.done?'var(--green-bd)':m.current?'var(--blue-bd)':'var(--bd)';

  if(!curDPid)return;
  const a=getA(curDPid);if(!a)return;
  document.getElementById('dp-ov').classList.add('on');
  const si=SIDX[a.stage]??0,s=sl(a.stage),h=calcHealth(a);
  const tabs=[
    {id:'overview',label:'Lifecycle'},
    {id:'milestone',label:'Milestones'},
    {id:'edit',label:'Edit'},
    {id:'meetings',label:`Meetings (${(a.meetings||[]).length})`},
    {id:'points',label:`Open Points${a.openPts>0?` (${a.openPts})`:''}`,nb:a.openPts>0},
    {id:'audit',label:'Audit'},
  ];
  const tabsHtml=tabs.map(t=>`<div class="ptab ${curPTab===t.id?'on':''}" onclick="setPTab('${t.id}')">${t.label}${t.nb?`<span class="ptab-nb">${a.openPts}</span>`:''}</div>`).join('');

  let body='';
  if(curPTab==='overview') body=renderPaneOverview(a,si,s);
  else if(curPTab==='milestone') body=renderMilestoneTree(a.id);
  else if(curPTab==='edit') body=renderPaneEdit(a);
  else if(curPTab==='meetings') body=renderPaneMeetings(a);
  else if(curPTab==='points') body=renderPanePoints(a);
  else if(curPTab==='audit') body=renderPaneAudit(a);

  document.getElementById('dp').innerHTML=`
    <div class="dp-hd">
      <div>
        <div style="font-size:15px;font-weight:600;margin-bottom:3px">${a.company}</div>
        <div class="fx-xs tc-3">${a.jira} &middot; ${a.region} &middot; ${a.owner||'--'}</div>
        <div class="fx fxa gap2 fxw mt2">${badge(a.status)}<span class="bx bx-b">${sn(a.stage)}</span><span class="bx bx-n">${a.mrr||'--'}</span></div>

  const lc=STAGES.map((st,i)=>{
    const done=i<si,cur=i===si,blk=cur&&a.blocker;
    return `<div class="lc-row">
      <div><div class="lc-nd ${done?'done':blk?'blk':cur?'cur':''}">${done?'&#10003;':cur?'&#9679;':i+1}</div>${i<STAGES.length-1?'<div class="lc-ln"></div>':''}</div>

    </div>`;
  }).join('');

  const kv=(l,v,warn=false)=>`<div class="card-sm"><div class="fx-xs tc-3">${l}</div><div class="fn fw5 mt1 ${warn?'t-r':''}">${v}</div></div>`;
  const isIntg=a.stage==='integration';

  return `<div style="padding:14px 18px">
    ${isIntg?`<div style="background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--r);padding:10px 12px;margin-bottom:12px">

        <div class="fn fw6 t-b">Integration Team Stage</div>
        <div class="fx-xs tc-2 mt1">Owner: <strong>Integration Team Lead</strong> &middot; Daily standup + weekly review required &middot; UAT sign-off mandatory before handover</div>
      </div></div>
    </div>`:''}
    ${isLive?`<div style="background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r);padding:10px 12px;margin-bottom:12px">
      <div class="fx fxa gap2"><span style="font-size:16px">&#10003;</span><div>
        <div class="fn fw6 t-g">Customer is Already Live in Production</div>
        <div class="fx-xs tc-2 mt1">Focus on: <strong>Usage</strong> &middot; <strong>Adoption (80%+ target)</strong> &middot; <strong>Issue resolution</strong> &middot; <strong>NPS collection</strong>. Move to Audit &amp; Validation when stable.</div>
      </div></div>
    </div>`:''}
    <div class="g2 mb3">
      ${kv('Planned Go-Live',fmtD(a.plannedGL))}
      ${kv('Expected Go-Live',fmtD(a.expectedGL),a.expectedGL>a.plannedGL)}
      ${kv('Days in Stage',`${a.daysInStage}d / ${s}d SLA`,a.daysInStage>s)}
      ${kv('Last Activity',fmtD(a.lastAct),dAgo(a.lastAct)>14)}
      ${kv('Next Meeting',a.nextMeet?fmtD(a.nextMeet):'Not set',!a.nextMeet)}
      ${kv(isIntg?'Integration Status':'Audit Status',a.auditSt)}
    </div>
    <div class="fn fw5 tc-3 mb2" style="text-transform:uppercase;letter-spacing:.4px;font-size:10px">Lifecycle Progress</div>
    ${lc}
    ${a.notes?`<div class="divider"></div><div class="fx-xs tc-3 mb1">Notes</div><div class="fn tc-2">${a.notes}</div>`:''}
  </div>`;
}

function saveEdit(id){

  if(_ge('e-company')!==null) a.company=_ge('e-company')||a.company;
  if(_ge('e-jira')!==null) a.jira=_ge('e-jira')||a.jira;
  if(_ge('e-region')!==null) a.region=_ge('e-region');

  if(_ge('e-owner')!==null) a.owner=_ge('e-owner');
  if(_ge('e-pgl')!==null) a.plannedGL=_ge('e-pgl');
  if(_ge('e-egl')!==null) a.expectedGL=_ge('e-egl');

function renderPaneAudit(a){
  const isIntg=a.stage==='integration';
  const isLiveStage=a.stage==='golive';
  const list=isIntg?INTEGRATION_CHECKLIST:isLiveStage?LIVE_CHECKLIST:CHECKLIST;
  // Ensure checks array is long enough
  if(!a.checks) a.checks=[];
  while(a.checks.length<list.length) a.checks.push(false);
  const done=a.checks.slice(0,list.length).filter(Boolean).length;
  return `<div style="padding:14px 18px">
    <div class="fx fxa fxb mb3">
      <div>
        <span class="fn fw5">${isIntg?'Integration Checklist':isLiveStage?'Live Monitoring Checklist':'Audit Checklist'} (${done}/${list.length})</span>
        ${isIntg?`<div class="fx-xs tc-3 mt1">Owner: Integration Team</div>`:isLiveStage?`<div class="fx-xs tc-3 mt1">Customer is live — monitor usage, adoption and issues daily</div>`:''}
      </div>
      <span class="bx ${a.auditSt==='Completed'?'bx-g':a.auditSt==='In Progress'?'bx-b':'bx-n'}">${a.auditSt}</span>
    </div>
    ${list.map((item,i)=>`
      <div class="cl-row" onclick="toggleCheck(${a.id},${i})">
        <div class="cl-chk ${(a.checks||[])[i]?'done':''}">${(a.checks||[])[i]?'&#10003;':''}</div>
        <span class="fn ${(a.checks||[])[i]?'tc-3':''}" style="${(a.checks||[])[i]?'text-decoration:line-through':''}">${item}</span>
      </div>`).join('')}
  </div>`;
}

function saveAddMeeting(accountId){

  <div class="mo-body">

          <span>Mark as <strong>Blocker</strong> (impacts go-live timeline)</span>
        </label>
      </div>
    </div>

    <button class="btn btn-p" onclick="saveAddPoint(${accountId})">Add Point</button>
    <button class="btn" onclick="closeMO()">Cancel</button>

function saveAddPoint(accountId){
  const t=document.getElementById('p-title').value.trim();
  if(!t){toast('Issue title is required',false);return;}
  const a=getA(accountId);if(!a)return;
  const blkEl=document.getElementById('p-blk');
  const priEl=document.getElementById('p-pri');
  const ownEl=document.getElementById('p-own');
  const notEl=document.getElementById('p-notes');
  const isBlk=blkEl?blkEl.checked:false;
  const p={id:uid(),title:t,prio:priEl?priEl.value:'Medium',owner:ownEl?ownEl.value:'',notes:notEl?notEl.value:'',age:0,blocker:isBlk,status:'Open'};
  a.points.push(p);
  a.openPts=(a.points||[]).filter(x=>x.status!=='Resolved').length;
  if(isBlk)a.blocker=t;
  saveA(a);closeMO();curDPid=accountId;curPTab='points';renderDP();
  updateNB();toast('Open point added');
}

function resolvePoint(accountId,pointId){
  const a=getA(accountId);if(!a)return;
  const p=a.points.find(x=>x.id===pointId);if(!p)return;
  p.status='Resolved';
  a.openPts=(a.points||[]).filter(x=>x.status!=='Resolved').length;
  if(p.blocker&&!a.points.find(x=>x.blocker&&x.status!=='Resolved'))a.blocker='';
  saveA(a);renderDP();updateNB();toast('Point resolved');
}

function deletePoint(accountId,pointId){
  const a=getA(accountId);if(!a)return;
  a.points=a.points.filter(p=>p.id!==pointId);
  a.openPts=(a.points||[]).filter(x=>x.status!=='Resolved').length;
  saveA(a);renderDP();updateNB();toast('Point deleted');
}

function toggleCheck(accountId,idx){
  const a=getA(accountId);if(!a)return;
  if(!a.checks)a.checks=[false,false,false,false,false];
  a.checks[idx]=!a.checks[idx];
  const done=a.checks.filter(Boolean).length;
  a.auditSt=done===CHECKLIST.length?'Completed':done>0?'In Progress':'Not Started';
  saveA(a);renderDP();toast(a.checks[idx]?'Item checked':'Item unchecked');
}

  // Compute engagement score for each account
  const scored = accounts.map(a=>{
    const h=calcHealth(a);
    const sentiment=a.sentiment||'neutral';
    const nps=a.nps!==undefined?a.nps:null;
    const engage = Math.min(100, Math.max(0,
      (a.meetings&&a.meetings.length?20:0)+
      (a.lastAct&&dAgo(a.lastAct)<7?30:dAgo(a.lastAct)<14?15:0)+
      (a.nextMeet?20:0)+
      (a.openPts===0?15:a.openPts<3?8:0)+
      (!a.blocker?15:0)
    ));
    const churnRisk = h<40?'High':h<65?'Medium':'Low';
    return {...a,h,sentiment,nps,engage,churnRisk};
  });

  // Summary stats
  const avgNPS = scored.filter(a=>a.nps!==null).length
    ? Math.round(scored.filter(a=>a.nps!==null).reduce((s,a)=>s+a.nps,0)/scored.filter(a=>a.nps!==null).length)
    : null;
  const churnHigh = scored.filter(a=>a.churnRisk==='High').length;
  const sentDist = SENTIMENTS.map(s=>({...s,count:scored.filter(a=>a.sentiment===s.k).length}));
  const avgEngage = Math.round(scored.reduce((s,a)=>s+a.engage,0)/scored.length);

  const rows = scored.map(a=>{
    const sm=SENTIMENTS.find(s=>s.k===a.sentiment)||SENTIMENTS[2];
    const npsColor=a.nps===null?'var(--tx3)':a.nps>=9?'var(--green)':a.nps>=7?'var(--amber)':'var(--red)';
    const churnBadge=a.churnRisk==='High'?'bx-r':a.churnRisk==='Medium'?'bx-a':'bx-g';
    return `<tr onclick="openHealthDetail(${a.id})" style="cursor:pointer">
      <td><div class="fw5 fn">${a.company}</div><div class="fx-xs tc-3">${a.jira}</div></td>
      <td><span class="sc">${sn(a.stage)}</span></td>
      <td>${badge(a.status)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:50px;background:var(--bg3);border-radius:100px;height:4px;overflow:hidden">
            <div style="height:100%;width:${a.h}%;background:${a.h>=70?'var(--green)':a.h>=40?'var(--amber)':'var(--red)'};border-radius:100px"></div>
          </div>
          <span class="fx-xs mono" style="color:${a.h>=70?'var(--green)':a.h>=40?'var(--amber)':'var(--red)'}">${a.h}</span>
        </div>
      </td>
      <td><span style="font-size:16px" title="${sm.label}">${sm.ic}</span></td>
      <td><span class="mono fn" style="color:${npsColor};font-weight:600">${a.nps!==null?a.nps:'--'}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:40px;background:var(--bg3);border-radius:100px;height:4px;overflow:hidden">
            <div style="height:100%;width:${a.engage}%;background:var(--blue);border-radius:100px"></div>
          </div>
          <span class="fx-xs tc-2">${a.engage}%</span>
        </div>
      </td>
      <td><span class="bx ${churnBadge}" style="font-size:9px">${a.churnRisk}</span></td>
      <td>
        <div style="display:flex;gap:4px">
          ${SENTIMENTS.map(s=>`<button onclick="event.stopPropagation();setsentiment(${a.id},'${s.k}')" title="${s.label}"
            style="padding:2px 5px;border:1px solid ${a.sentiment===s.k?s.col:'var(--bd)'};border-radius:4px;background:${a.sentiment===s.k?s.bg:'transparent'};cursor:pointer;font-size:12px">${s.ic}</button>`).join('')}
        </div>
      </td>
      <td onclick="event.stopPropagation()">
        <input type="number" min="0" max="10" value="${a.nps!==null?a.nps:''}" placeholder="0-10"
          onchange="setNPS(${a.id},+this.value)"
          style="width:52px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:3px 6px;color:var(--tx);font-size:12px;font-family:var(--m)">
      </td>
    </tr>`;
  }).join('');

  document.getElementById('pb').innerHTML=`
  <div class="gm mb4">
    <div class="met"><div class="met-l">Avg Health</div><div class="met-v" style="color:${Math.round(scored.reduce((s,a)=>s+a.h,0)/scored.length)>=70?'var(--green)':'var(--amber)'}">${Math.round(scored.reduce((s,a)=>s+a.h,0)/scored.length)}</div><div class="met-s">/100 portfolio</div></div>
    <div class="met"><div class="met-l">Avg NPS</div><div class="met-v" style="color:${avgNPS===null?'var(--tx3)':avgNPS>=8?'var(--green)':avgNPS>=6?'var(--amber)':'var(--red)'}">${avgNPS!==null?avgNPS:'--'}</div><div class="met-s">${scored.filter(a=>a.nps!==null).length} responses</div></div>
    <div class="met"><div class="met-l">Avg Engagement</div><div class="met-v t-b">${avgEngage}%</div><div class="met-s">responsiveness</div></div>
    <div class="met"><div class="met-l">Churn Risk</div><div class="met-v t-r">${churnHigh}</div><div class="met-s">High risk accounts</div></div>
    <div class="met"><div class="met-l">Feeling Great</div><div class="met-v t-g">${scored.filter(a=>['great','good'].includes(a.sentiment)).length}</div><div class="met-s">Happy customers</div></div>
    <div class="met"><div class="met-l">Feeling Bad</div><div class="met-v t-r">${scored.filter(a=>['worried','bad'].includes(a.sentiment)).length}</div><div class="met-s">Need attention</div></div>
  </div>
  <div class="card mb4 card-p">
    <div class="sec-title mb3">Sentiment Distribution</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${sentDist.map(s=>`<div style="background:${s.bg};border:1px solid ${s.col}33;border-radius:var(--r);padding:10px 16px;text-align:center;min-width:90px">
        <div style="font-size:24px">${s.ic}</div>
        <div style="font-size:16px;font-weight:600;color:${s.col};font-family:var(--m)">${s.count}</div>
        <div class="fx-xs tc-2">${s.label}</div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card" style="padding:0">
    <div class="tw"><table>
      <thead><tr><th>Account</th><th>Stage</th><th>Status</th><th>Health</th><th>Sentiment</th><th>NPS</th><th>Engagement</th><th>Churn Risk</th><th>Set Sentiment</th><th>Set NPS</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

function setsentiment(id,s){const a=getA(id);if(!a)return;a.sentiment=s;saveA(a);renderHealth();toast('Sentiment updated');}
function setNPS(id,n){const a=getA(id);if(!a)return;if(n<0||n>10)return;a.nps=n;saveA(a);toast('NPS saved');}

function openHealthDetail(id){
  const a=getA(id);if(!a)return;
  const sm=SENTIMENTS.find(s=>s.k===(a.sentiment||'neutral'))||SENTIMENTS[2];
  const engage=Math.min(100,Math.max(0,(a.meetings&&a.meetings.length?20:0)+(a.lastAct&&dAgo(a.lastAct)<7?30:dAgo(a.lastAct)<14?15:0)+(a.nextMeet?20:0)+(a.openPts===0?15:a.openPts<3?8:0)+(!a.blocker?15:0)));
  openMO(`
  <div class="mo-hd"><span class="mo-hd-title">Health Detail — ${a.company}</span><button class="btn btn-sm" onclick="closeMO()">&#10005;</button></div>
  <div class="mo-body">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div class="card-sm" style="text-align:center"><div style="font-size:28px">${sm.ic}</div><div class="fn fw5" style="color:${sm.col}">${sm.label}</div><div class="fx-xs tc-3">Sentiment</div></div>
      <div class="card-sm" style="text-align:center"><div class="met-v" style="color:${a.nps!==null?(a.nps>=9?'var(--green)':a.nps>=7?'var(--amber)':'var(--red)'):'var(--tx3)'}">${a.nps!==null?a.nps:'--'}</div><div class="fx-xs tc-3">NPS Score</div></div>
      <div class="card-sm" style="text-align:center"><div class="met-v t-b">${engage}%</div><div class="fx-xs tc-3">Engagement</div></div>
    </div>
    <div class="fn fw5 mb2">Engagement Breakdown</div>
    ${[
      ['Meetings logged',a.meetings&&a.meetings.length>0,'Helps — meeting history exists','No meetings logged yet'],
      ['Activity in last 7 days',a.lastAct&&dAgo(a.lastAct)<7,'Last activity was recent','No recent activity — risk of disengagement'],
      ['Next meeting scheduled',!!a.nextMeet,'Future meeting booked','No meeting scheduled'],
      ['No open points',a.openPts===0,'No open issues — clean account','Has open points that need resolution'],
      ['No active blocker',!a.blocker,'No blockers — smooth progress','Active blocker is dragging the account'],
    ].map(([label,ok,good,bad])=>`
      <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)">
        <span style="font-size:16px">${ok?'✅':'❌'}</span>
        <div class="f1"><div class="fn">${label}</div><div class="fx-xs" style="color:${ok?'var(--green)':'var(--red)'}">${ok?good:bad}</div></div>
      </div>`).join('')}
    <div class="fl mt3"><label>Update NPS (0-10)</label>
      <input id="hd-nps" type="number" min="0" max="10" value="${a.nps!==null?a.nps:''}" placeholder="Enter NPS score 0-10"></div>
    <div class="fn fw5 mt3 mb2">Set Sentiment</div>
    <div style="display:flex;gap:8px">${SENTIMENTS.map(s=>`<button onclick="setHealthSentiment(${a.id},'${s.k}')" style="padding:8px 12px;border:1.5px solid ${a.sentiment===s.k?s.col:'var(--bd)'};border-radius:var(--r);background:${a.sentiment===s.k?s.bg:'var(--bg2)'};cursor:pointer;font-size:18px">${s.ic}</button>`).join('')}</div>
  </div>
  <div class="mo-ft">
    <button class="btn btn-p" onclick="saveHealthDetail(${a.id})">Save</button>
    <button class="btn" onclick="closeMO()">Cancel</button>
  </div>`);
}

function setHealthSentiment(id,s){const a=getA(id);if(!a)return;a.sentiment=s;saveA(a);openHealthDetail(id);}
function saveHealthDetail(id){
  const a=getA(id);if(!a)return;
  const npsEl=document.getElementById('hd-nps');
  if(npsEl&&npsEl.value!==undefined&&npsEl.value!==''){const n=parseInt(npsEl.value);if(!isNaN(n)&&n>=0&&n<=10){a.nps=n;saveA(a);}}
  closeMO();renderHealth();toast('Health data saved');
}
function openNPSBatch(){
  const rows=accounts.map(a=>`
    <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)">
      <div class="f1 fn fw5">${a.company}</div>
      ${SENTIMENTS.map(s=>`<button onclick="setsentiment(${a.id},'${s.k}')" style="padding:3px 6px;border:1px solid ${(a.sentiment||'neutral')===s.k?s.col:'var(--bd)'};border-radius:4px;background:${(a.sentiment||'neutral')===s.k?s.bg:'transparent'};cursor:pointer;font-size:13px">${s.ic}</button>`).join('')}
      <input type="number" min="0" max="10" value="${a.nps!==null&&a.nps!==undefined?a.nps:''}" placeholder="NPS"
        onchange="setNPS(${a.id},+this.value)"
        style="width:52px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:3px 6px;color:var(--tx);font-size:12px">
    </div>`).join('');
  openMO(`
  <div class="mo-hd"><span class="mo-hd-title">Log NPS & Sentiment — All Accounts</span><button class="btn btn-sm" onclick="closeMO()">&#10005;</button></div>
  <div class="mo-body" style="max-height:65vh;overflow-y:auto">
    <div class="fx-xs tc-3 mb3">Set sentiment emoji and NPS (0-10) for each account after your last touchpoint.</div>
    ${rows}
  </div>
  <div class="mo-ft"><button class="btn btn-p" onclick="closeMO();renderHealth()">Done</button></div>`);
}

// CAPACITY PLANNER MODULE
// ═══════════════════════════════════════════════════════
function renderCapacity(){
  document.getElementById('pt').textContent='Capacity Planner';
  document.getElementById('ps').textContent='CSM workload · Go-live forecast · Bottleneck detection';
  document.getElementById('ph-r').innerHTML='';

  const owners=[...new Set(accounts.map(a=>a.owner).filter(Boolean))];

  // CSM Workload
  // Integration stage accounts owned by Integration Team — show separately
  const intgAccounts=accounts.filter(a=>a.stage==='integration');
  const csmStats=owners.map(o=>{
    const mine=accounts.filter(a=>a.owner===o);
    const red=mine.filter(a=>a.status==='red').length;
    const yel=mine.filter(a=>a.status==='yellow').length;
    const avgH=mine.length?Math.round(mine.reduce((s,a)=>s+calcHealth(a),0)/mine.length):0;
    const overloaded=red>=2||(mine.length>=8);
    return {name:o,total:mine.length,red,yel,green:mine.filter(a=>a.status==='green').length,avgH,overloaded,accounts:mine};
  });

  // Stage bottlenecks — stages with more accounts than ideal
  const stageCounts=STAGES.map(s=>({...s,count:accounts.filter(a=>a.stage===s.id).length}));
  const bottlenecks=stageCounts.filter(s=>s.count>=4);

  // Go-live forecast next 90 days
  const now=new Date();
  const in30=accounts.filter(a=>a.expectedGL&&new Date(a.expectedGL)<=new Date(now.getTime()+30*864e5)&&a.stage!=='stab'&&a.stage!=='golive');
  const in60=accounts.filter(a=>a.expectedGL&&new Date(a.expectedGL)>new Date(now.getTime()+30*864e5)&&new Date(a.expectedGL)<=new Date(now.getTime()+60*864e5));
  const in90=accounts.filter(a=>a.expectedGL&&new Date(a.expectedGL)>new Date(now.getTime()+60*864e5)&&new Date(a.expectedGL)<=new Date(now.getTime()+90*864e5));

  const csmCards=csmStats.map(c=>`
    <div class="card card-p" style="border-left:3px solid ${c.overloaded?'var(--red)':c.avgH>=70?'var(--green)':'var(--amber)'}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        ${av(c.name,'av-l')}
        <div class="f1">
          <div class="fn fw6">${c.name}</div>
          <div class="fx-xs tc-3">${c.total} accounts · avg health ${c.avgH}</div>
        </div>
        ${c.overloaded?'<span class="bx bx-r" style="font-size:9px">Overloaded</span>':'<span class="bx bx-g" style="font-size:9px">Balanced</span>'}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">
        <div style="text-align:center;background:var(--red-bg);border-radius:var(--r);padding:6px"><div class="fn fw6 t-r">${c.red}</div><div class="fx-xs tc-3">Critical</div></div>
        <div style="text-align:center;background:var(--amber-bg);border-radius:var(--r);padding:6px"><div class="fn fw6 t-a">${c.yel}</div><div class="fx-xs tc-3">At Risk</div></div>
        <div style="text-align:center;background:var(--green-bg);border-radius:var(--r);padding:6px"><div class="fn fw6 t-g">${c.green}</div><div class="fx-xs tc-3">On Track</div></div>
      </div>
      <div class="pw" style="height:5px"><div class="pb2 ${c.avgH>=70?'p-g':c.avgH>=40?'p-a':'p-r'}" style="width:${c.avgH}%;height:100%"></div></div>
      <div class="fx-xs tc-3 mt1">Avg health: ${c.avgH}/100</div>
      <div style="margin-top:10px">
        ${c.accounts.slice(0,4).map(a=>`<div style="display:flex;align-items:center;gap:6px;padding:3px 0"><span style="width:8px;height:8px;border-radius:50%;background:${a.status==='red'?'var(--red)':a.status==='yellow'?'var(--amber)':'var(--green)'};flex-shrink:0;display:inline-block"></span><span class="fx-xs trunc" style="flex:1">${a.company}</span><span class="fx-xs sc">${sn(a.stage)}</span></div>`).join('')}
        ${c.accounts.length>4?`<div class="fx-xs tc-3">+${c.accounts.length-4} more</div>`:''}
      </div>
    </div>`).join('');

  const bottleHtml=bottlenecks.length?bottlenecks.map(s=>`
    <div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bd)">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0"></div>
      <div class="fn f1"><span class="fw5">${s.name}</span> — <span class="t-r">${s.count} accounts stuck</span></div>
      <span class="bx bx-r" style="font-size:9px">Bottleneck</span>
    </div>`).join(''):'<div class="fn tc-3">No bottlenecks detected</div>';

  const glRows=(win,label)=>win.length?`<div class="fn fw5 tc-2 mb1">${label} (${win.length})</div>${win.map(a=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)">
      <span class="fw5 fn f1">${a.company}</span>
      <span class="sc">${sn(a.stage)}</span>
      ${badge(a.status)}
      <span class="fx-xs tc-3">${fmtD(a.expectedGL)}</span>
    </div>`).join('')}<div class="mb3"></div>`:'' ;

  document.getElementById('pb').innerHTML=`
  <div class="gm mb4">
    <div class="met"><div class="met-l">CSMs</div><div class="met-v">${owners.length}</div><div class="met-s">Active team members</div></div>
    <div class="met"><div class="met-l">Go-Lives (30d)</div><div class="met-v t-b">${in30.length}</div><div class="met-s">Next 30 days</div></div>
    <div class="met"><div class="met-l">Go-Lives (60d)</div><div class="met-v t-b">${in60.length}</div><div class="met-s">30-60 days</div></div>
    <div class="met"><div class="met-l">Go-Lives (90d)</div><div class="met-v t-b">${in90.length}</div><div class="met-s">60-90 days</div></div>
    <div class="met"><div class="met-l">Bottlenecks</div><div class="met-v ${bottlenecks.length?'t-r':'t-g'}">${bottlenecks.length}</div><div class="met-s">Stage pile-ups</div></div>
    <div class="met"><div class="met-l">Overloaded CSMs</div><div class="met-v ${csmStats.filter(c=>c.overloaded).length?'t-r':'t-g'}">${csmStats.filter(c=>c.overloaded).length}</div><div class="met-s">Need rebalancing</div></div>
  </div>
  <div class="g2 mb4">
    <div class="card card-p">
      <div class="sec-title mb3">Stage Bottleneck Detector</div>
      ${bottleHtml}
      <div class="divider"></div>
      <div class="sec-title mb3">All Stage Counts</div>
      ${stageCounts.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <div class="fx-xs tc-2" style="width:130px;flex-shrink:0">${s.name}</div>
        <div style="flex:1;background:var(--bg3);border-radius:100px;height:5px;overflow:hidden">
          <div style="height:100%;width:${accounts.length?Math.round((s.count/accounts.length)*100):0}%;background:${s.count>=4?'var(--red)':s.count>=2?'var(--amber)':'var(--blue)'};border-radius:100px"></div>
        </div>
        <span class="mono fx-xs" style="min-width:16px;text-align:right;color:${s.count>=4?'var(--red)':'var(--tx2)'}">${s.count}</span>
      </div>`).join('')}
    </div>
    <div class="card card-p">
      <div class="sec-title mb3">Go-Live Forecast (Next 90 Days)</div>
      ${glRows(in30,'Next 30 days')}
      ${glRows(in60,'30–60 days')}
      ${glRows(in90,'60–90 days')}
      ${!in30.length&&!in60.length&&!in90.length?'<div class="fn tc-3">No go-lives with confirmed dates in next 90 days</div>':''}
    </div>
  </div>
  <div class="sec-title mb3">CSM Workload</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">${csmCards}</div>`;
}

// PLAYBOOKS — FULLY EDITABLE PER-ACCOUNT SYSTEM
// ═══════════════════════════════════════════════════════
let selPB=null;       // index of selected global template
let pbMode='list';    // 'list' | 'view' | 'edit' | 'new' | 'account'
let pbEditStep=null;  // step being edited inside a playbook
let pbAccView=null;   // accountId for per-account playbook view

// Per-account playbooks: { accountId: { stageId: [steps], customNotes, checklist } }
let accountPlaybooks={};

function getAccountPB(accountId){
  if(!accountPlaybooks[accountId])accountPlaybooks[accountId]={};
  return accountPlaybooks[accountId];
}

function getAccountStagePB(accountId,stageId){
  const apb=getAccountPB(accountId);
  if(!apb[stageId]){
    // Clone from global template for this stage
    const globalPB=PLAYBOOKS.find(p=>p.stage===stageId);
    apb[stageId]={
      steps: globalPB?JSON.parse(JSON.stringify(globalPB.steps)):[],
      watchouts: globalPB?[...globalPB.watchouts]:[],
      notes:'',
      customTitle: globalPB?globalPB.title:'Custom Playbook for '+sn(stageId),
      kpi: globalPB?globalPB.kpi:'',
      owner: globalPB?globalPB.owner||'':'',
    };
  }
  return apb[stageId];
}

function renderPlaybooks(){
  document.getElementById('pt').textContent='Playbooks';
  document.getElementById('ps').textContent='';

  if(pbMode==='account'&&pbAccView){renderAccountPlaybooks();return;}
  if(pbMode==='view'&&selPB!==null){renderPlaybookDetail();return;}
  if(pbMode==='edit'&&selPB!==null){renderPlaybookEditor();return;}
  if(pbMode==='new'){renderNewPlaybook();return;}
  renderPlaybookList();
}

function saveGlobalPB(idx){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const pb=PLAYBOOKS[idx];
  pb.title=g('pb-title')||pb.title;
  pb.icon=g('pb-icon')||pb.icon;
  pb.stage=g('pb-stage')||pb.stage;
  pb.owner=g('pb-owner');
  pb.kpi=g('pb-kpi')||pb.kpi;
  pb.tags=g('pb-tags').split(',').map(t=>t.trim()).filter(Boolean);
  // Save steps
  pb.steps.forEach((s,i)=>{
    const t=g('st-title-'+i);const d=document.getElementById('st-desc-'+i);const a=document.getElementById('st-action-'+i);
    if(t)s.title=t;
    if(d)s.desc=d.value.trim();
    if(a)s.action=a.value;
  });
  // Save watchouts
  pb.watchouts=pb.watchouts.map((w,i)=>{
    const el=document.getElementById('wo-'+i);return el?el.value.trim():w;
  }).filter(Boolean);
  pbMode='view';pbEditStep=null;renderPlaybooks();toast('Playbook saved');
}

function addPBStep(idx){
  PLAYBOOKS[idx].steps.push({title:'New Step',desc:'Describe what needs to happen in this step.',action:'CSM'});
  renderPlaybooks();
}
function deletePBStep(idx,stepIdx){
  PLAYBOOKS[idx].steps.splice(stepIdx,1);renderPlaybooks();
}
function movePBStep(idx,stepIdx,dir){
  const steps=PLAYBOOKS[idx].steps;
  if(dir==='up'&&stepIdx>0)[steps[stepIdx-1],steps[stepIdx]]=[steps[stepIdx],steps[stepIdx-1]];
  else if(dir==='down'&&stepIdx<steps.length-1)[steps[stepIdx],steps[stepIdx+1]]=[steps[stepIdx+1],steps[stepIdx]];
  renderPlaybooks();
}
function addPBWatchout(idx){
  PLAYBOOKS[idx].watchouts.push('New watch-out — describe the risk');renderPlaybooks();
}
function deletePBWatchout(idx,wIdx){
  PLAYBOOKS[idx].watchouts.splice(wIdx,1);renderPlaybooks();
}
function deletePlaybook(idx){
  if(!confirm('Delete "'+PLAYBOOKS[idx].title+'"?'))return;
  PLAYBOOKS.splice(idx,1);pbMode='list';selPB=null;renderPlaybooks();toast('Playbook deleted');
}

function createNewPlaybook(){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const title=g('new-pb-title');
  if(!title){toast('Title is required',false);return;}
  const steps=[];
  for(let i=0;i<newStepCount;i++){
    const t=g('new-s'+i);const aEl=document.getElementById('new-a'+i);
    if(t)steps.push({title:t,desc:'',action:aEl?aEl.value:'CSM'});
  }
  const newPB={id:'custom_'+uid(),stage:g('new-pb-stage')||'all',icon:g('new-pb-icon')||'📋',title,

  PLAYBOOKS.push(newPB);

function saveAccountPB(accountId,stageId,stepCount,woCount){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const pb=getAccountStagePB(accountId,stageId);
  pb.customTitle=g('apb-title');
  pb.owner=g('apb-owner');
  pb.notes=g('apb-notes');
  // Save steps
  for(let i=0;i<stepCount;i++){
    if(!pb.steps[i])break;
    const t=g('apbs-t-'+i);const dEl=document.getElementById('apbs-d-'+i);const aEl=document.getElementById('apbs-a-'+i);
    if(t)pb.steps[i].title=t;
    if(dEl)pb.steps[i].desc=dEl.value.trim();
    if(aEl)pb.steps[i].action=aEl.value;
  }
  // Save watchouts
  for(let i=0;i<woCount;i++){
    const v=g('apb-wo-'+i);if(v&&pb.watchouts[i]!==undefined)pb.watchouts[i]=v;
  }
  pb.watchouts=pb.watchouts.filter(Boolean);
  closeMO();
  const a=getA(accountId);toast('Playbook saved for '+a.company+' — '+sn(stageId));
  if(pbMode==='account'&&pbAccView)renderPlaybooks();
}

function applyPlaybook(pbIdx){
  const selEl=document.getElementById('pb-acc-sel');
  if(!selEl){toast('Select an account from the dropdown above',false);return;}
  const accId=parseInt(selEl.value);
  if(!accId){toast('Select an account first',false);return;}
  const a=getA(accId);const pb=PLAYBOOKS[pbIdx];
  if(!a||!pb)return;
  pb.steps.forEach((s,i)=>{
    if(!a.points.find(p=>p.title.includes(s.title))){
      a.points.push({id:uid(),title:`[${pb.icon}] Step ${i+1}: ${s.title}`,prio:i<2?'High':'Medium',owner:s.action==='Customer'?'Customer':a.owner||'CSM',age:0,blocker:false,status:'Open',notes:s.desc});
    }
  });
  a.openPts=a.points.filter(p=>p.status!=='Resolved').length;
  saveA(a);toast(`${pb.steps.length} steps added to ${a.company}`);
}

  const html='<html><head><title>Report</title><style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;padding:24px;background:#fff;color:#111;font-size:13px;line-height:1.5}.bx,.sc{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600}table{width:100%;border-collapse:collapse}th,td{padding:6px 10px;border:1px solid #e2e8f0;text-align:left;font-size:12px}th{background:#f8fafc}@media print{body{padding:0}}</style></head><body>'+rc.innerHTML+'</body></html>';
  const win=window.open('','_blank','width=900,height=700');
  if(!win){
    // Popup blocked — fallback: open as data URI
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.target='_blank';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('Opened in new tab (allow popups for direct print)');
    return;
  }
  try{
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(()=>{try{win.print();}catch(e){toast('Use Ctrl+P to print',false);}},600);
  }catch(e){
    toast('Could not open print window — check popup settings',false);
  }
}
